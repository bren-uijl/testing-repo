name: Remote macOS Safari

on:
  workflow_dispatch:

jobs:
  remote-macos:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:

      - name: Install dependencies
        run: |
          brew install \
            cloudflared \
            imagemagick \
            cliclick \
            screenresolution

      - name: Set display resolution
        run: |
          screenresolution set 1440x900x24 || true

      - name: Create stream folder
        run: |
          mkdir -p stream

      - name: Open Safari
        run: |
          open -a Safari "https://apple.com"
          sleep 8

      - name: Start screenshot loop
        run: |
          cat > screenshot.sh << 'EOF'
          while true
          do
            screencapture -x stream/latest.jpg 2>/dev/null || true

            if [ -f stream/latest.jpg ]; then
              convert stream/latest.jpg \
                -quality 60 \
                stream/latest.jpg 2>/dev/null || true
            fi

            sleep 0.20
          done
          EOF

          chmod +x screenshot.sh

          nohup ./screenshot.sh >/dev/null 2>&1 &

      - name: Create webpage
        run: |
          cat > stream/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Remote macOS</title>

            <style>

              html, body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: black;
                font-family: sans-serif;
              }

              #screen {
                position: absolute;

                top: 50%;
                left: 50%;

                transform: translate(-50%, -50%);

                width: auto;
                height: auto;

                max-width: calc(100vw - 100px);
                max-height: 100vh;

                object-fit: contain;

                cursor: crosshair;

                user-select: none;
                -webkit-user-select: none;
              }

              #sidebar {

                position: fixed;

                top: 0;
                right: 0;

                width: 100px;
                height: 100vh;

                background: #111;

                border-left: 1px solid #333;

                display: flex;
                flex-direction: column;

                align-items: center;

                padding-top: 10px;

                box-sizing: border-box;

                z-index: 9999;
              }

              .btn {

                width: 80px;
                height: 34px;

                margin-bottom: 8px;

                border: none;

                border-radius: 8px;

                background: #222;

                color: white;

                cursor: pointer;
              }

              .btn.active {
                background: #0066ff;
              }

              #slider {
                writing-mode: vertical-lr;
                direction: rtl;

                width: 30px;
                height: 220px;

                margin-top: 15px;
              }

              #value {
                color: white;
                margin-top: 10px;
                font-size: 12px;
              }

            </style>
          </head>

          <body>

            <img id="screen">

            <div id="sidebar">

              <button class="btn" id="cmd">
                CMD
              </button>

              <button class="btn" id="ctrl">
                CTRL
              </button>

              <button class="btn" id="alt">
                ALT
              </button>

              <button class="btn" id="shift">
                SHIFT
              </button>

              <input
                id="slider"
                type="range"
                min="50"
                max="1000"
                value="200"
                step="10"
              >

              <div id="value">
                200ms
              </div>

            </div>

            <script>

              const screen =
                document.getElementById("screen");

              const slider =
                document.getElementById("slider");

              const value =
                document.getElementById("value");

              let loading = false;

              let remoteWidth = 1440;
              let remoteHeight = 900;

              let refreshInterval = 200;

              let refreshTimer;

              let mouseDown = false;

              const heldModifiers = new Set();

              const modifierMap = {
                cmd: "cmd",
                ctrl: "ctrl",
                alt: "alt",
                shift: "shift"
              };

              function startRefreshLoop() {

                if (refreshTimer) {
                  clearInterval(refreshTimer);
                }

                refreshTimer = setInterval(
                  refresh,
                  refreshInterval
                );
              }

              slider.addEventListener(
                "input",
                () => {

                  refreshInterval =
                    Number(slider.value);

                  value.innerText =
                    refreshInterval + "ms";

                  startRefreshLoop();
                }
              );

              async function refresh() {

                if (loading) return;

                loading = true;

                try {

                  const response = await fetch(
                    "latest.jpg?t=" + Date.now(),
                    {
                      cache: "no-store"
                    }
                  );

                  const blob =
                    await response.blob();

                  const bitmap =
                    await createImageBitmap(blob);

                  remoteWidth = bitmap.width;
                  remoteHeight = bitmap.height;

                  const url =
                    URL.createObjectURL(blob);

                  const oldSrc = screen.src;

                  screen.src = url;

                  if (
                    oldSrc &&
                    oldSrc.startsWith("blob:")
                  ) {
                    URL.revokeObjectURL(oldSrc);
                  }

                } catch(e) {}

                loading = false;
              }

              startRefreshLoop();

              refresh();

              async function send(url) {

                try {

                  await fetch(url, {
                    method: "GET",
                    cache: "no-store",
                    keepalive: true
                  });

                } catch(e) {}
              }

              function getCoords(e) {

                const rect =
                  screen.getBoundingClientRect();

                const relX =
                  (e.clientX - rect.left)
                  / rect.width;

                const relY =
                  (e.clientY - rect.top)
                  / rect.height;

                return {
                  x: Math.round(relX * remoteWidth),
                  y: Math.round(relY * remoteHeight)
                };
              }

              screen.addEventListener(
                "mousedown",
                async (e) => {

                  mouseDown = true;

                  const {x, y} =
                    getCoords(e);

                  await send(
                    `/mousedown?x=${x}&y=${y}`
                  );
                }
              );

              screen.addEventListener(
                "mouseup",
                async (e) => {

                  mouseDown = false;

                  const {x, y} =
                    getCoords(e);

                  await send(
                    `/mouseup?x=${x}&y=${y}`
                  );
                }
              );

              screen.addEventListener(
                "mousemove",
                async (e) => {

                  if (!mouseDown) return;

                  const {x, y} =
                    getCoords(e);

                  await send(
                    `/mousemove?x=${x}&y=${y}`
                  );
                }
              );

              screen.addEventListener(
                "wheel",
                async (e) => {

                  e.preventDefault();

                  const delta =
                    Math.sign(e.deltaY) * 8;

                  await send(
                    `/scroll?dy=${delta}`
                  );
                },
                { passive: false }
              );

              document.addEventListener(
                "keydown",
                async (e) => {

                  if (e.repeat) return;

                  await send(
                    `/keydown?text=${encodeURIComponent(e.key)}`
                  );
                }
              );

              document.addEventListener(
                "keyup",
                async (e) => {

                  await send(
                    `/keyup?text=${encodeURIComponent(e.key)}`
                  );
                }
              );

              for (const id of Object.keys(modifierMap)) {

                const btn =
                  document.getElementById(id);

                btn.addEventListener(
                  "click",
                  async () => {

                    const key =
                      modifierMap[id];

                    if (heldModifiers.has(key)) {

                      heldModifiers.delete(key);

                      btn.classList.remove(
                        "active"
                      );

                      await send(
                        `/keyup?text=${key}`
                      );

                    } else {

                      heldModifiers.add(key);

                      btn.classList.add(
                        "active"
                      );

                      await send(
                        `/keydown?text=${key}`
                      );
                    }
                  }
                );
              }

            </script>

          </body>
          </html>
          EOF

      - name: Create control server
        run: |
          cat > control.py << 'EOF'
          from http.server import BaseHTTPRequestHandler, HTTPServer
          from socketserver import ThreadingMixIn

          import urllib.parse
          import subprocess
          import os

          ROOT = "stream"

          class Handler(BaseHTTPRequestHandler):

              def log_message(self, format, *args):
                  return

              def ok(self):
                  self.send_response(200)
                  self.send_header(
                      "Cache-Control",
                      "no-store"
                  )
                  self.end_headers()
                  self.wfile.write(b"ok")

              def do_GET(self):

                  parsed = urllib.parse.urlparse(
                      self.path
                  )

                  path = parsed.path

                  query = urllib.parse.parse_qs(
                      parsed.query
                  )

                  if path == "/mousedown":

                      x = query.get("x", ["0"])[0]
                      y = query.get("y", ["0"])[0]

                      subprocess.run([
                          "cliclick",
                          f"dd:{x},{y}"
                      ])

                      self.ok()
                      return

                  if path == "/mouseup":

                      x = query.get("x", ["0"])[0]
                      y = query.get("y", ["0"])[0]

                      subprocess.run([
                          "cliclick",
                          f"du:{x},{y}"
                      ])

                      self.ok()
                      return

                  if path == "/mousemove":

                      x = query.get("x", ["0"])[0]
                      y = query.get("y", ["0"])[0]

                      subprocess.run([
                          "cliclick",
                          f"m:{x},{y}"
                      ])

                      self.ok()
                      return

                  if path == "/scroll":

                      dy = query.get(
                          "dy",
                          ["0"]
                      )[0]

                      subprocess.run([
                          "cliclick",
                          f"w:0,{dy}"
                      ])

                      self.ok()
                      return

                  if path == "/keydown":

                      text = query.get(
                          "text",
                          [""]
                      )[0]

                      keymap = {
                          "cmd": "command",
                          "ctrl": "ctrl",
                          "alt": "alt",
                          "shift": "shift",
                          "Enter": "return",
                          "Backspace": "delete",
                          "Tab": "tab",
                          "Escape": "esc",
                          "ArrowUp": "arrow-up",
                          "ArrowDown": "arrow-down",
                          "ArrowLeft": "arrow-left",
                          "ArrowRight": "arrow-right"
                      }

                      if text in keymap:

                          subprocess.run([
                              "cliclick",
                              f"kp:{keymap[text]}"
                          ])

                      elif len(text) == 1:

                          subprocess.run([
                              "cliclick",
                              f"t:{text}"
                          ])

                      self.ok()
                      return

                  if path == "/keyup":

                      self.ok()
                      return
                  if path == "/":

                      path = "/index.html"

                  file_path = ROOT + path

                  if os.path.exists(file_path):

                      self.send_response(200)

                      self.send_header(
                          "Cache-Control",
                          "no-store, no-cache, must-revalidate"
                      )

                      if file_path.endswith(".html"):

                          self.send_header(
                              "Content-Type",
                              "text/html"
                          )

                      elif file_path.endswith(".jpg"):

                          self.send_header(
                              "Content-Type",
                              "image/jpeg"
                          )

                      self.end_headers()

                      with open(file_path, "rb") as f:
                          self.wfile.write(f.read())

                      return

                  self.send_response(404)
                  self.end_headers()

          class ThreadedHTTPServer(
              ThreadingMixIn,
              HTTPServer
          ):
              daemon_threads = True

          ThreadedHTTPServer(
              ("0.0.0.0", 8080),
              Handler
          ).serve_forever()
          EOF

      - name: Start control server
        run: |
          nohup python3 control.py >/dev/null 2>&1 &

      - name: Start Cloudflare tunnel
        run: |
          nohup cloudflared tunnel \
            --url http://localhost:8080 \
            > cloudflare.log 2>&1 &

          sleep 15

          echo ""
          echo "================================="
          echo "REMOTE MAC URL"
          echo "================================="

          grep -o \
            'https://[-0-9a-z]*\.trycloudflare.com' \
            cloudflare.log \
            | head -n 1

          echo "================================="

      - name: Keep runner alive
        run: |
          caffeinate -dimsu &

          while true
          do
            echo "alive $(date)"
            sleep 60
          done
