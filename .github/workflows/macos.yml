name: Remote macOS Safari

on:
  workflow_dispatch:

jobs:
  remote-macos:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:

      - name: Install dependencies
        run: |
          brew install cloudflared imagemagick cliclick screenresolution

      - name: Set display resolution
        run: |
          screenresolution set 1440x900x24 || true

      - name: Create folders
        run: |
          mkdir -p stream

      - name: Open Safari
        run: |
          open -a Safari "https://apple.com"
          sleep 8

      - name: Screenshot loop
        run: |
          cat > screenshot.sh << 'EOF'
          while true
          do
            screencapture -x stream/latest.jpg 2>/dev/null || true

            if [ -f stream/latest.jpg ]; then
              convert stream/latest.jpg \
                -quality 55 \
                stream/latest.jpg 2>/dev/null || true
            fi

            sleep 0.25
          done
          EOF

          chmod +x screenshot.sh

          nohup ./screenshot.sh >/dev/null 2>&1 &

      - name: Create webpage
        run: |
          cat > stream/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Remote macOS</title>

            <style>

              html, body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: black;
              }

              #screen {
                position: fixed;
                inset: 0;

                width: 100vw;
                height: 100vh;

                object-fit: fill;

                background: black;

                cursor: crosshair;

                user-select: none;
                -webkit-user-select: none;

                touch-action: none;
              }

            </style>
          </head>

          <body>

            <img id="screen">

            <script>

              const screen = document.getElementById("screen");

              const REMOTE_WIDTH = 1440;
              const REMOTE_HEIGHT = 900;

              let loading = false;

              async function refresh() {

                if (loading) return;

                loading = true;

                try {

                  const response = await fetch(
                    "latest.jpg?t=" + Date.now(),
                    {
                      cache: "no-store"
                    }
                  );

                  const blob = await response.blob();

                  const url = URL.createObjectURL(blob);

                  const oldSrc = screen.src;

                  screen.src = url;

                  if (oldSrc.startsWith("blob:")) {
                    URL.revokeObjectURL(oldSrc);
                  }

                } catch (e) {
                  console.log(e);
                }

                loading = false;
              }

              setInterval(refresh, 300);

              refresh();

              async function send(url) {

                try {

                  await fetch(url, {
                    method: "GET",
                    cache: "no-store",
                    keepalive: true
                  });

                } catch(e) {
                  console.log(e);
                }
              }

              screen.addEventListener("click", async (e) => {

                const rect = screen.getBoundingClientRect();

                const relX =
                  (e.clientX - rect.left) / rect.width;

                const relY =
                  (e.clientY - rect.top) / rect.height;

                const x =
                  Math.round(relX * REMOTE_WIDTH);

                const y =
                  Math.round(relY * REMOTE_HEIGHT);

                console.log("click", x, y);

                await send(`/click?x=${x}&y=${y}`);
              });

              document.addEventListener("keydown", async (e) => {

                console.log("key", e.key);

                await send(
                  `/key?text=${encodeURIComponent(e.key)}`
                );
              });

            </script>

          </body>
          </html>
          EOF

      - name: Create threaded control server
        run: |
          cat > control.py << 'EOF'
          from http.server import BaseHTTPRequestHandler, HTTPServer
          from socketserver import ThreadingMixIn

          import urllib.parse
          import subprocess
          import os

          ROOT = "stream"

          class Handler(BaseHTTPRequestHandler):

              def log_message(self, format, *args):
                  return

              def do_GET(self):

                  parsed = urllib.parse.urlparse(self.path)

                  path = parsed.path

                  query = urllib.parse.parse_qs(parsed.query)

                  if path == "/click":

                      x = query.get("x", ["0"])[0]
                      y = query.get("y", ["0"])[0]

                      subprocess.run([
                          "cliclick",
                          f"c:{x},{y}"
                      ])

                      self.send_response(200)
                      self.send_header("Cache-Control", "no-store")
                      self.end_headers()
                      self.wfile.write(b"ok")
                      return

                  if path == "/key":

                      text = query.get("text", [""])[0]

                      if text == "Enter":

                          subprocess.run([
                              "cliclick",
                              "kp:return"
                          ])

                      elif text == "Backspace":

                          subprocess.run([
                              "cliclick",
                              "kp:delete"
                          ])

                      elif text == "Tab":

                          subprocess.run([
                              "cliclick",
                              "kp:tab"
                          ])

                      elif text == "Escape":

                          subprocess.run([
                              "cliclick",
                              "kp:esc"
                          ])

                      elif len(text) == 1:

                          subprocess.run([
                              "cliclick",
                              f"t:{text}"
                          ])

                      self.send_response(200)
                      self.send_header("Cache-Control", "no-store")
                      self.end_headers()
                      self.wfile.write(b"ok")
                      return

                  if path == "/":
                      path = "/index.html"

                  file_path = ROOT + path

                  if os.path.exists(file_path):

                      self.send_response(200)

                      self.send_header(
                          "Cache-Control",
                          "no-store, no-cache, must-revalidate"
                      )

                      if file_path.endswith(".html"):
                          self.send_header(
                              "Content-Type",
                              "text/html"
                          )

                      elif file_path.endswith(".jpg"):
                          self.send_header(
                              "Content-Type",
                              "image/jpeg"
                          )

                      self.end_headers()

                      with open(file_path, "rb") as f:
                          self.wfile.write(f.read())

                      return

                  self.send_response(404)
                  self.end_headers()

          class ThreadedHTTPServer(
              ThreadingMixIn,
              HTTPServer
          ):
              daemon_threads = True

          ThreadedHTTPServer(
              ("0.0.0.0", 8080),
              Handler
          ).serve_forever()
          EOF

      - name: Start control server
        run: |
          nohup python3 control.py >/dev/null 2>&1 &

      - name: Start Cloudflare tunnel
        run: |
          nohup cloudflared tunnel \
            --url http://localhost:8080 \
            > cloudflare.log 2>&1 &

          sleep 15

          echo ""
          echo "====================================="
          echo "REMOTE MAC URL"
          echo "====================================="

          grep -o 'https://[-0-9a-z]*\.trycloudflare.com' \
            cloudflare.log \
            | head -n 1

          echo "====================================="

      - name: Keep alive
        run: |
          caffeinate -dimsu &

          while true
          do
            echo "alive $(date)"
            sleep 60
          done
