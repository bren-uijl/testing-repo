name: OpenCode Auto Run v3

on:
  workflow fluxbox \  workflow_dispatch:
            dbus-x11 \
            wmctrl \
            x11-utils \
            xdotool \
            scrot \
            imagemagick \
            curl \
            wget \
            jq \
            python3 \
            python3-aiohttp \
            xterm

      - name: Start virtual Linux desktop
        run: |
          Xvfb :99 -screen 0 ${SCREEN_WIDTH}x${SCREEN_HEIGHT}x24 -ac +extension GLX +render > /tmp/xvfb.log 2>&1 &
          sleep 2

          eval "$(dbus-launch --sh-syntax)"
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> "$GITHUB_ENV"
          echo "DBUS_SESSION_BUS_PID=$DBUS_SESSION_BUS_PID" >> "$GITHUB_ENV"

          fluxbox > /tmp/fluxbox.log 2>&1 &
          sleep 2

          xdpyinfo -display :99 >/dev/null
          echo "Virtual desktop ready on DISPLAY=$DISPLAY"
          echo "Resolution: ${SCREEN_WIDTH}x${SCREEN_HEIGHT}"

      - name: Create HTTP GUI and terminal stream
        run: |
          cat > /tmp/http_stream.py <<'PY'
          import asyncio
          import html
          import os
          import subprocess
          from aiohttp import web

          DISPLAY = os.environ.get("DISPLAY", ":99")
          STREAM_PORT = int(os.environ.get("STREAM_PORT", "8765"))
          SCREEN_WIDTH = int(os.environ.get("SCREEN_WIDTH", "1440"))
          SCREEN_HEIGHT = int(os.environ.get("SCREEN_HEIGHT", "900"))

          OPENCODE_LOG_PATH = "/tmp/opencode-output.log"
          PNG_PATH = "/tmp/http-screen.png"
          JPG_PATH = "/tmp/http-screen.jpg"

          INDEX_HTML = f"""<!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>OpenCode Live View</title>
            <style>
              html, body {{
                margin: 0;
                padding: 0;
                background: #111;
                color: #eee;
                font-family: Arial, sans-serif;
                overflow: auto;
              }}

              #bar {{
                padding: 8px 12px;
                background: #222;
                border-bottom: 1px solid #333;
                position: sticky;
                top: 0;
                z-index: 10;
              }}

              #layout {{
                display: flex;
                align-items: flex-start;
                gap: 12px;
                padding: 12px;
              }}

              #screen-wrap {{
                flex: 0 0 auto;
                width: {SCREEN_WIDTH}px;
                height: {SCREEN_HEIGHT}px;
                background: #000;
                border: 1px solid #444;
                overflow: hidden;
              }}

              #screen {{
                display: block;
                width: {SCREEN_WIDTH}px;
                height: {SCREEN_HEIGHT}px;
                max-width: none;
                max-height: none;
                object-fit: fill;
                cursor: crosshair;
              }}

              #terminal-wrap {{
                flex: 0 0 760px;
                height: {SCREEN_HEIGHT}px;
                background: #050505;
                border: 1px solid #444;
                overflow: hidden;
                display: flex;
                flex-direction: column;
              }}

              #terminal-title {{
                padding: 8px;
                background: #181818;
                border-bottom: 1px solid #333;
                font-weight: bold;
              }}

              #terminal {{
                margin: 0;
                padding: 10px;
                flex: 1;
                overflow: auto;
                white-space: pre-wrap;
                word-break: break-word;
                font-family: Consolas, Monaco, monospace;
                font-size: 13px;
                line-height: 1.35;
                color: #d8d8d8;
              }}

              .small {{
                color: #aaa;
                font-size: 12px;
              }}
            </style>
          </head>
          <body>
            <div id="bar">
              <strong>OpenCode Live View</strong>
              <span class="small">
                — HTTP only
                — GUI {SCREEN_WIDTH}x{SCREEN_HEIGHT}
                — click image to send mouse click
                — arrow keys, Enter, Escape, Backspace, Tab, Space are forwarded
              </span>
            </div>

            <div id="layout">
              <div id="screen-wrap">
                <img id="screen" src="/stream.mjpg">
              </div>

              <div id="terminal-wrap">
                <div id="terminal-title">OpenCode terminal output</div>
                <pre id="terminal">Waiting for OpenCode output...</pre>
              </div>
            </div>

            <script>
              const img = document.getElementById("screen");
              const terminal = document.getElementById("terminal");
              let userScrolledTerminal = false;

              terminal.addEventListener("scroll", () => {{
                const nearBottom = terminal.scrollHeight - terminal.scrollTop - terminal.clientHeight < 40;
                userScrolledTerminal = !nearBottom;
              }});

              async function refreshTerminal() {{
                try {{
                  const response = await fetch("/terminal", {{ cache: "no-store" }});
                  const text = await response.text();
                  terminal.textContent = text || "Waiting for OpenCode output...";

                  if (!userScrolledTerminal) {{
                    terminal.scrollTop = terminal.scrollHeight;
                  }}
                }} catch (error) {{
                  terminal.textContent = "Could not load terminal output: " + error;
                }}
              }}

              setInterval(refreshTerminal, 1000);
              refreshTerminal();

              img.addEventListener("click", async (event) => {{
                const rect = img.getBoundingClientRect();
                const x = Math.round((event.clientX - rect.left) * {SCREEN_WIDTH} / rect.width);
                const y = Math.round((event.clientY - rect.top) * {SCREEN_HEIGHT} / rect.height);

                await fetch("/click", {{
                  method: "POST",
                  headers: {{ "Content-Type": "application/json" }},
                  body: JSON.stringify({{ x, y }})
                }});
              }});

              window.addEventListener("keydown", async (event) => {{
                const allowed = [
                  "ArrowUp",
                  "ArrowDown",
                  "ArrowLeft",
                  "ArrowRight",
                  "Enter",
                  "Escape",
                  "Backspace",
                  "Tab",
                  " "
                ];

                if (!allowed.includes(event.key)) {{
                  return;
                }}

                event.preventDefault();

                await fetch("/key", {{
                  method: "POST",
                  headers: {{ "Content-Type": "application/json" }},
                  body: JSON.stringify({{ key: event.key }})
                }});
              }});
            </script>
          </body>
          </html>
          """

          def run_cmd(args):
              env = os.environ.copy()
              env["DISPLAY"] = DISPLAY
              env["GDK_BACKEND"] = "x11"
              env["NO_AT_BRIDGE"] = "1"

              return subprocess.run(
                  args,
                  env=env,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
              )

          def read_terminal_log():
              if not os.path.exists(OPENCODE_LOG_PATH):
                  return "Waiting for OpenCode output..."

              try:
                  with open(OPENCODE_LOG_PATH, "rb") as f:
                      f.seek(0, os.SEEK_END)
                      size = f.tell()
                      f.seek(max(size - 120000, 0), os.SEEK_SET)
                      return f.read().decode("utf-8", errors="replace")
              except Exception as e:
                  return f"Could not read OpenCode log: {e}"

          def take_jpeg_screenshot():
              result = run_cmd(["scrot", PNG_PATH])

              if result.returncode != 0:
                  raise RuntimeError(result.stderr or result.stdout or "scrot failed")

              convert = run_cmd([
                  "convert",
                  PNG_PATH,
                  "-quality",
                  "80",
                  JPG_PATH
              ])

              if convert.returncode != 0:
                  raise RuntimeError(convert.stderr or convert.stdout or "convert failed")

              with open(JPG_PATH, "rb") as f:
                  return f.read()

          async def index(request):
              return web.Response(
                  text=INDEX_HTML,
                  content_type="text/html"
              )

          async def stream_mjpeg(request):
              response = web.StreamResponse(
                  status=200,
                  reason="OK",
                  headers={
                      "Content-Type": "multipart/x-mixed-replace; boundary=frame",
                      "Cache-Control": "no-cache, no-store, must-revalidate",
                      "Pragma": "no-cache",
                      "Expires": "0",
                  },
              )

              await response.prepare(request)

              while True:
                  try:
                      jpg = take_jpeg_screenshot()

                      await response.write(b"--frame\r\n")
                      await response.write(b"Content-Type: image/jpeg\r\n")
                      await response.write(f"Content-Length: {len(jpg)}\r\n\r\n".encode("ascii"))
                      await response.write(jpg)
                      await response.write(b"\r\n")

                      await asyncio.sleep(0.5)
                  except asyncio.CancelledError:
                      break
                  except ConnectionResetError:
                      break
                  except Exception as e:
                      text = html.escape(str(e)).encode("utf-8", errors="replace")
                      await response.write(b"--frame\r\n")
                      await response.write(b"Content-Type: text/plain\r\n\r\n")
                      await response.write(text)
                      await response.write(b"\r\n")
                      await asyncio.sleep(1)

              return response

          async def terminal(request):
              return web.Response(
                  text=read_terminal_log(),
                  content_type="text/plain"
              )

          async def click(request):
              data = await request.json()
              x = str(int(data.get("x", 0)))
              y = str(int(data.get("y", 0)))

              run_cmd(["xdotool", "mousemove", x, y, "click", "1"])

              return web.json_response({
                  "ok": True,
                  "x": x,
                  "y": y
              })

          async def key(request):
              data = await request.json()
              key_name = str(data.get("key", ""))

              key_map = {
                  "ArrowUp": "Up",
                  "ArrowDown": "Down",
                  "ArrowLeft": "Left",
                  "ArrowRight": "Right",
                  "Enter": "Return",
                  "Escape": "Escape",
                  "Backspace": "BackSpace",
                  "Tab": "Tab",
                  " ": "space",
              }

              mapped = key_map.get(key_name)

              if mapped:
                  run_cmd(["xdotool", "key", mapped])

              return web.json_response({
                  "ok": True,
                  "key": key_name,
                  "mapped": mapped
              })

          async def health(request):
              return web.Response(text="ok\n")

          app = web.Application()
          app.router.add_get("/", index)
          app.router.add_get("/index.html", index)
          app.router.add_get("/stream.mjpg", stream_mjpeg)
          app.router.add_get("/terminal", terminal)
          app.router.add_post("/click", click)
          app.router.add_post("/key", key)
          app.router.add_get("/health", health)

          if __name__ == "__main__":
              web.run_app(app, host="0.0.0.0", port=STREAM_PORT)
          PY

      - name: Start HTTP GUI and terminal stream
        run: |
          touch /tmp/opencode-output.log

          python3 /tmp/http_stream.py > /tmp/http-stream.log 2>&1 &
          sleep 3

          curl -f http://localhost:${STREAM_PORT}/health

      - name: Install cloudflared
        run: |
          wget -q -O cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: Start Cloudflare tunnel to live view
        run: |
          cloudflared tunnel --url http://localhost:${STREAM_PORT} --no-autoupdate > /tmp/cloudflared.log 2>&1 &

          for i in {1..60}; do
            URL="$(grep -o 'https://[-a-z0-9.]*trycloudflare.com' /tmp/cloudflared.log | head -n 1 || true)"

            if [ -n "$URL" ]; then
              echo "STREAM_URL=$URL" >> "$GITHUB_ENV"
              echo "::notice title=Live OpenCode GUI and Terminal::$URL"
              echo "Live view: $URL"
              exit 0
            fi

            sleep 2
          done

          echo "Cloudflare tunnel did not start correctly."
          cat /tmp/cloudflared.log
          exit 1

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Create UI helper
        run: |
          cat > /tmp/ui <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          export DISPLAY="${DISPLAY:-:99}"
          export GDK_BACKEND="${GDK_BACKEND:-x11}"
          export NO_AT_BRIDGE="${NO_AT_BRIDGE:-1}"

          case "${1:-}" in
            screenshot)
              out="${2:-/tmp/ui-screenshot.png}"
              scrot "$out"
              echo "$out"
              ;;

            click)
              xdotool mousemove "$2" "$3" click 1
              ;;

            rightclick)
              xdotool mousemove "$2" "$3" click 3
              ;;

            doubleclick)
              xdotool mousemove "$2" "$3" click --repeat 2 --delay 100 1
              ;;

            drag)
              xdotool mousemove "$2" "$3" mousedown 1 mousemove "$4" "$5" mouseup 1
              ;;

            key)
              xdotool key "$2"
              ;;

            type)
              shift
              xdotool type --delay 20 "$*"
              ;;

            mousemove)
              xdotool mousemove "$2" "$3"
              ;;

            window-list)
              echo "wmctrl:"
              wmctrl -lx || true
              echo ""
              echo "xdotool:"
              xdotool search --onlyvisible --name ".*" getwindowname %@ || true
              ;;

            xwininfo)
              xwininfo -root -tree | head -120
              ;;

            fix-window)
              name="${2:-}"
              width="${3:-900}"
              height="${4:-700}"
              x="${5:-200}"
              y="${6:-100}"

              if [ -z "$name" ]; then
                echo "Usage: ui fix-window NAME WIDTH HEIGHT X Y"
                exit 1
              fi

              win="$(xdotool search --name "$name" | head -n 1 || true)"

              if [ -z "$win" ]; then
                echo "No window found matching: $name"
                exit 1
              fi

              xdotool windowmap "$win" || true
              xdotool windowsize "$win" "$width" "$height" || true
              xdotool windowmove "$win" "$x" "$y" || true
              xdotool windowraise "$win" || true
              wmctrl -ia "$win" || true

              echo "$win"
              ;;

            launch)
              shift
              nohup "$@" > /tmp/ui-launch.log 2>&1 &
              echo "$!"
              ;;

            *)
              echo "Usage:"
              echo "  ui screenshot [PATH]"
              echo "  ui click X Y"
              echo "  ui rightclick X Y"
              echo "  ui doubleclick X Y"
              echo "  ui drag X1 Y1 X2 Y2"
              echo "  ui key KEY"
              echo "  ui type TEXT"
              echo "  ui mousemove X Y"
              echo "  ui window-list"
              echo "  ui xwininfo"
              echo "  ui fix-window NAME WIDTH HEIGHT X Y"
              echo "  ui launch COMMAND ARGS..."
              exit 1
              ;;
          esac
          EOF

          chmod +x /tmp/ui
          sudo ln -sf /tmp/ui /usr/local/bin/ui

      - name: Run OpenCode
        id: opencode_run
        env:
          INPUT_PROMPT: ${{ github.event.inputs.prompt }}
          INPUT_MODEL: ${{ github.event.inputs.model }}
          INPUT_DIR: ${{ github.event.inputs.working_directory }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
        run: |
          TARGET_DIR="."
          if [ -n "$INPUT_DIR" ]; then
            TARGET_DIR="$INPUT_DIR"
          fi

          cd "$TARGET_DIR"

          {
            echo "=== Starting OpenCode Run ==="
            echo "Model: $INPUT_MODEL"
            echo "Working directory: $TARGET_DIR"
            echo "Display: $DISPLAY"
            echo "Screen: ${SCREEN_WIDTH}x${SCREEN_HEIGHT}"
            echo "Transport: HTTP only, no WebSockets"
            echo "Live view: $STREAM_URL"
            printf 'User prompt: %s\n' "$INPUT_PROMPT"
            echo ""
          } | tee -a /tmp/opencode-output.log

          SYSTEM_PROMPT="You are an autonomous AI agent running in GitHub Actions.

          ROLE:
          You are a skilled software engineer with expertise in code review, refactoring, bug fixing, feature implementation, testing, debugging, and GUI interaction.

          ENVIRONMENT:
          You are running on Linux in GitHub Actions.
          The virtual desktop is available on DISPLAY=:99.
          GUI apps should be launched with DISPLAY=:99.
          GTK apps should use GDK_BACKEND=x11.
          The screen dimensions are ${SCREEN_WIDTH}x${SCREEN_HEIGHT}.
          The coordinate system starts at the top-left corner.
          Top-left is 0,0.
          Bottom-right is approximately ${SCREEN_WIDTH},${SCREEN_HEIGHT}.

          GUI CONTROL:
          You can interact with GUI applications using these shell commands:
          - ui screenshot
          - ui screenshot PATH
          - ui click X Y
          - ui rightclick X Y
          - ui doubleclick X Y
          - ui drag X1 Y1 X2 Y2
          - ui key KEY
          - ui type TEXT
          - ui mousemove X Y
          - ui window-list
          - ui xwininfo
          - ui fix-window NAME WIDTH HEIGHT X Y
          - ui launch COMMAND ARGS

          GUI WORKFLOW:
          1. Start GUI apps in the background.
          2. Wait a few seconds after launching GUI apps.
          3. Always take a screenshot before clicking.
          4. If the screenshot only shows the desktop background, inspect windows with ui window-list and ui xwininfo.
          5. If the target app exists but is tiny, hidden, or misplaced, use ui fix-window.
          6. Use coordinates carefully based on the ${SCREEN_WIDTH}x${SCREEN_HEIGHT} screen.
          7. Prefer direct shell checks and logs when useful, but use the GUI tools when the task requires visual interaction.

          BEHAVIOR RULES:
          1. Always read and understand existing code before making changes.
          2. Follow the existing code style and conventions of the project.
          3. Make incremental, well-tested changes.
          4. Never break existing functionality.
          5. Write clear, concise code without unnecessary comments.
          6. Prefer editing existing files over creating new ones.
          7. Always verify your changes work before committing.

          WORKFLOW:
          1. Explore the codebase to understand structure and conventions.
          2. Plan your changes mentally before executing.
          3. Make one logical change at a time.
          4. After each file edit, commit immediately with a descriptive message.
          5. Run any available tests or linting after changes.
          6. If something fails, diagnose and fix before proceeding.
          7. Push before you stop.

          COMMIT STANDARDS:
          - Use conventional commit format when possible.
          - Keep commits atomic.
          - Write meaningful commit messages that explain what changed and why.
          - Git config is already done.

          ERROR HANDLING:
          - If a tool fails, retry once with adjusted parameters.
          - If stuck, document the issue and move on.
          - Never leave the codebase in a broken state.

          TIME CONSTRAINT:
          You have 6 hours to complete your task. Check the time when you start. Work thoroughly and do not stop early if the task still needs useful work."

          FULL_PROMPT="${SYSTEM_PROMPT}

          USER REQUEST:
          ${INPUT_PROMPT}

          Remember:
          - After each edit, commit what you have done.
          - Write instructions for your future self down in a .opencode folder.
          - Use screenshots before clicking when doing GUI work.
          - If a GUI window is not visible, inspect and fix the window instead of just waiting."

          echo "Prompt length: ${#FULL_PROMPT} characters"
          echo "" | tee -a /tmp/opencode-output.log

          opencode run "$FULL_PROMPT" --model "$INPUT_MODEL" --thinking --dangerously-skip-permissions 2>&1 | tee -a /tmp/opencode-output.log

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opencode-v3-debug
          path: |
            /tmp/*.log
            /tmp/*.png
            /tmp/*.jpg
            /tmp/opencode-output.log
    inputs:
      prompt:
        description: "What should OpenCode do? Be specific for best results."
        required: true
        default: "Inspect this project and improve it where useful."
      branch:
        description: "Branch to run on"
        required: true
        default: "main"
      model:
        description: "AI model to use"
        required: false
        default: "opencode/qwen3.6-plus-free"
      working_directory:
        description: "Subdirectory to work in (leave empty for repo root)"
        required: false
        default: ""

permissions: write-all

jobs:
  opencode:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      DISPLAY: ":99"
      STREAM_PORT: "8765"
      SCREEN_WIDTH: "1440"
      SCREEN_HEIGHT: "900"
      GDK_BACKEND: "x11"
      NO_AT_BRIDGE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "opencode-agent"
          git config --global user.email "opencode-agent@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install Linux GUI, automation, and stream dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
