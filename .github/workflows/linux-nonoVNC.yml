name: Openbox Input Diagnostics Fixed v2

on:
  workflow_dispatch:

jobs:
  diagnose-openbox-input:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DISPLAY: ":0"
      XAUTHORITY: "/tmp/xvfb.auth"

    steps:
      - name: Install packages
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            xauth \
            x11-utils \
            x11-xserver-utils \
            openbox \
            xdotool \
            scrot \
            imagemagick \
            libxml2-utils \
            python3

      - name: Start Xvfb with shared auth
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          rm -f "$XAUTHORITY"
          touch "$XAUTHORITY"

          COOKIE="$(mcookie)"
          xauth -f "$XAUTHORITY" add :0 . "$COOKIE"
          xauth -f "$XAUTHORITY" add localhost:0 . "$COOKIE"

          Xvfb :0 \
            -screen 0 1280x800x24 \
            -auth "$XAUTHORITY" \
            +extension XTEST \
            +extension RANDR \
            -ac \
            > xvfb.log 2>&1 &

          sleep 3

          echo "=== xvfb.log ==="
          cat xvfb.log || true

          echo "=== xauth list ==="
          xauth -f "$XAUTHORITY" list || true

          echo "=== XTEST check ==="
          xdpyinfo | grep -i xtest || true

          echo "=== initial mouse location ==="
          xdotool getmouselocation || true

      - name: Use stock Openbox rc.xml and custom menu.xml
        run: |
          set -euxo pipefail

          mkdir -p ~/.config/openbox artifacts

          cp /etc/xdg/openbox/rc.xml ~/.config/openbox/rc.xml

          cat > ~/.config/openbox/menu.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <openbox_menu xmlns="http://openbox.org/3.4/menu">
            <menu id="root-menu" label="Root Menu">
              <item label="Write marker file">
                <action name="Execute">
                  <command>sh -lc 'echo INPUT_WORKS > "$HOME/input_works.txt"'</command>
                </action>
              </item>
              <separator />
              <item label="Blue background">
                <action name="Execute">
                  <command>sh -lc "xsetroot -solid '#003366'"</command>
                </action>
              </item>
              <item label="Green background">
                <action name="Execute">
                  <command>sh -lc "xsetroot -solid '#006633'"</command>
                </action>
              </item>
              <item label="Red background">
                <action name="Execute">
                  <command>sh -lc "xsetroot -solid '#663300'"</command>
                </action>
              </item>
            </menu>
          </openbox_menu>
          EOF

          echo "=== validate rc.xml ==="
          xmllint --noout ~/.config/openbox/rc.xml

          echo "=== validate menu.xml ==="
          xmllint --noout ~/.config/openbox/menu.xml

          echo "=== rc.xml head ==="
          sed -n '1,120p' ~/.config/openbox/rc.xml

          echo "=== menu.xml ==="
          cat ~/.config/openbox/menu.xml

      - name: Start Openbox
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          rm -f "$HOME/input_works.txt"

          xsetroot -solid '#000000'

          nohup openbox --config-file "$HOME/.config/openbox/rc.xml" > openbox.log 2>&1 &
          sleep 3

          echo "=== openbox process ==="
          ps aux | grep -E '[o]penbox|[X]vfb' || true

          echo "=== openbox.log ==="
          cat openbox.log || true

      - name: Create screenshot helper
        run: |
          set -euxo pipefail

          cat > screenshot.sh << 'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          name="$1"

          scrot "artifacts/${name}.png"
          identify "artifacts/${name}.png" || true

          convert "artifacts/${name}.png" \
            -format "%[pixel:p{640,400}]\n" info: \
            > "artifacts/${name}.center-pixel.txt" || true
          EOF

          chmod +x screenshot.sh

      - name: Baseline screenshot
        run: |
          set -euxo pipefail
          ./screenshot.sh 01_baseline

      - name: Test 1 - move pointer
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          xdotool mousemove --sync 640 400
          xdotool getmouselocation | tee artifacts/02_mouse_after_move.txt

          ./screenshot.sh 02_after_move

      - name: Test 2 - open menu with right click
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          xdotool mousemove --sync 640 400
          xdotool click 3
          sleep 1

          ./screenshot.sh 03_menu_opened

      - name: Test 3 - click first menu item with mouse
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          rm -f "$HOME/input_works.txt"

          # Open menu at center
          xdotool mousemove --sync 640 400
          xdotool click 3
          sleep 0.7

          # Click inside first item (slightly right/down from menu origin)
          xdotool mousemove --sync 690 412
          xdotool click 1
          sleep 1

          if [ -f "$HOME/input_works.txt" ]; then
            echo "INPUT_WORKS marker created." | tee artifacts/04_marker_result.txt
            cat "$HOME/input_works.txt" | tee -a artifacts/04_marker_result.txt
          else
            echo "Marker file was NOT created." | tee artifacts/04_marker_result.txt
            exit 1
          fi

          ./screenshot.sh 04_after_marker_click

      - name: Test 4 - click Blue background item with mouse
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          # Reset to black
          xsetroot -solid '#000000'
          sleep 1
          ./screenshot.sh 05_reset_black

          # Open menu again
          xdotool mousemove --sync 640 400
          xdotool click 3
          sleep 0.7

          # Click inside "Blue background" item
          # First item is at top; blue is below separator, so slightly lower.
          xdotool mousemove --sync 700 452
          xdotool click 1
          sleep 1

          ./screenshot.sh 06_after_blue_click

      - name: Compare pixels
        run: |
          set -euxo pipefail

          {
            echo "=== baseline center pixel ==="
            cat artifacts/01_baseline.center-pixel.txt || true
            echo
            echo "=== menu-opened center pixel ==="
            cat artifacts/03_menu_opened.center-pixel.txt || true
            echo
            echo "=== reset-black center pixel ==="
            cat artifacts/05_reset_black.center-pixel.txt || true
            echo
            echo "=== after-blue center pixel ==="
            cat artifacts/06_after_blue_click.center-pixel.txt || true
          } | tee artifacts/07_pixel_compare.txt

      - name: Collect debug info
        if: always()
        run: |
          set +e

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          {
            echo "=== xdotool mouse location ==="
            xdotool getmouselocation

            echo
            echo "=== visible windows ==="
            xdotool search --onlyvisible --name ".*" getwindowname %@

            echo
            echo "=== processes ==="
            ps aux | grep -E 'openbox|Xvfb|xdotool' | grep -v grep

            echo
            echo "=== rc.xml ==="
            cat ~/.config/openbox/rc.xml

            echo
            echo "=== menu.xml ==="
            cat ~/.config/openbox/menu.xml

            echo
            echo "=== xvfb.log ==="
            cat xvfb.log

            echo
            echo "=== openbox.log ==="
            cat openbox.log
          } > artifacts/debug.txt 2>&1

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openbox-input-diagnostics-fixed-v2
          path: artifacts/
