name: Openbox Input Diagnostics Fixed v3

on:
  workflow_dispatch:

jobs:
  diagnose-openbox-input:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DISPLAY: ":0"
      XAUTHORITY: "/tmp/xvfb.auth"

    steps:
      - name: Install packages
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            xauth \
            x11-utils \
            x11-xserver-utils \
            openbox \
            xdotool \
            scrot \
            imagemagick \
            libxml2-utils \
            python3

      - name: Start Xvfb with shared auth
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          rm -f "$XAUTHORITY"
          touch "$XAUTHORITY"

          COOKIE="$(mcookie)"
          xauth -f "$XAUTHORITY" add :0 . "$COOKIE"
          xauth -f "$XAUTHORITY" add localhost:0 . "$COOKIE"

          Xvfb :0 \
            -screen 0 1280x800x24 \
            -auth "$XAUTHORITY" \
            +extension XTEST \
            +extension RANDR \
            -ac \
            > xvfb.log 2>&1 &

          sleep 3

          xdpyinfo | grep -i xtest || true
          xdotool getmouselocation || true

      - name: Create helper scripts
        run: |
          set -euxo pipefail

          mkdir -p "$HOME/bin" "$HOME/.config/openbox" artifacts
          : > "$HOME/action.log"

          cat > "$HOME/bin/write-marker.sh" << 'EOF'
          #!/usr/bin/env bash
          set -euxo pipefail
          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth
          echo "WRITE_MARKER start $(date -Iseconds)" >> "$HOME/action.log"
          echo INPUT_WORKS > "$HOME/input_works.txt"
          echo "WRITE_MARKER done $(date -Iseconds)" >> "$HOME/action.log"
          EOF

          cat > "$HOME/bin/bg-blue.sh" << 'EOF'
          #!/usr/bin/env bash
          set -euxo pipefail
          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth
          echo "BG_BLUE start $(date -Iseconds)" >> "$HOME/action.log"
          xsetroot -solid '#003366'
          echo "BG_BLUE done $(date -Iseconds)" >> "$HOME/action.log"
          EOF

          cat > "$HOME/bin/bg-green.sh" << 'EOF'
          #!/usr/bin/env bash
          set -euxo pipefail
          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth
          echo "BG_GREEN start $(date -Iseconds)" >> "$HOME/action.log"
          xsetroot -solid '#006633'
          echo "BG_GREEN done $(date -Iseconds)" >> "$HOME/action.log"
          EOF

          cat > "$HOME/bin/bg-red.sh" << 'EOF'
          #!/usr/bin/env bash
          set -euxo pipefail
          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth
          echo "BG_RED start $(date -Iseconds)" >> "$HOME/action.log"
          xsetroot -solid '#663300'
          echo "BG_RED done $(date -Iseconds)" >> "$HOME/action.log"
          EOF

          chmod +x "$HOME/bin/"*.sh

      - name: Use stock Openbox rc.xml and direct-script menu.xml
        run: |
          set -euxo pipefail

          cp /etc/xdg/openbox/rc.xml "$HOME/.config/openbox/rc.xml"

          # Remove the missing Debian menu include so openbox.log stays clean
          sed -i '/debian-menu\.xml/d' "$HOME/.config/openbox/rc.xml"

          cat > "$HOME/.config/openbox/menu.xml" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <openbox_menu xmlns="http://openbox.org/3.4/menu">
            <menu id="root-menu" label="Root Menu">
              <item label="Write marker file">
                <action name="Execute">
                  <command>$HOME/bin/write-marker.sh</command>
                </action>
              </item>
              <separator />
              <item label="Blue background">
                <action name="Execute">
                  <command>$HOME/bin/bg-blue.sh</command>
                </action>
              </item>
              <item label="Green background">
                <action name="Execute">
                  <command>$HOME/bin/bg-green.sh</command>
                </action>
              </item>
              <item label="Red background">
                <action name="Execute">
                  <command>$HOME/bin/bg-red.sh</command>
                </action>
              </item>
            </menu>
          </openbox_menu>
          EOF

          xmllint --noout "$HOME/.config/openbox/rc.xml"
          xmllint --noout "$HOME/.config/openbox/menu.xml"

      - name: Start Openbox
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          rm -f "$HOME/input_works.txt"
          : > "$HOME/action.log"

          xsetroot -solid '#000000'

          nohup openbox --config-file "$HOME/.config/openbox/rc.xml" > openbox.log 2>&1 &
          sleep 3

          ps aux | grep -E '[o]penbox|[X]vfb' || true
          cat openbox.log || true

      - name: Create screenshot helper
        run: |
          set -euxo pipefail

          cat > screenshot.sh << 'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          name="$1"

          scrot "artifacts/${name}.png"
          identify "artifacts/${name}.png" || true

          convert "artifacts/${name}.png" \
            -format "%[pixel:p{640,400}]\n" info: \
            > "artifacts/${name}.center-pixel.txt" || true
          EOF

          chmod +x screenshot.sh

      - name: Baseline screenshot
        run: |
          set -euxo pipefail
          ./screenshot.sh 01_baseline

      - name: Test 1 - move pointer
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          xdotool mousemove --sync 640 400
          xdotool getmouselocation | tee artifacts/02_mouse_after_move.txt
          ./screenshot.sh 02_after_move

      - name: Test 2 - open root menu
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          xdotool mousemove --sync 640 400
          xdotool click 3
          sleep 1

          ./screenshot.sh 03_menu_opened

      - name: Test 3 - click first item using measured coordinates
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          rm -f "$HOME/input_works.txt"
          : > "$HOME/action.log"

          # Open menu
          xdotool mousemove --sync 640 400
          xdotool click 3
          sleep 0.8

          # Measured from your extracted screenshot:
          # menu box ~= [640,400]..[768,484]
          # first item center ~= (704,409)
          xdotool mousemove --sync 704 409
          sleep 0.1
          xdotool mousedown 1
          sleep 0.08
          xdotool mouseup 1
          sleep 1

          if [ -f "$HOME/input_works.txt" ]; then
            echo "Marker created" | tee artifacts/04_marker_result.txt
          else
            echo "Marker file was NOT created." | tee artifacts/04_marker_result.txt
            echo "" >> artifacts/04_marker_result.txt
            echo "=== action.log ===" >> artifacts/04_marker_result.txt
            cat "$HOME/action.log" >> artifacts/04_marker_result.txt || true
            exit 1
          fi

          echo "" >> artifacts/04_marker_result.txt
          echo "=== action.log ===" >> artifacts/04_marker_result.txt
          cat "$HOME/action.log" >> artifacts/04_marker_result.txt || true

          ./screenshot.sh 04_after_marker_click

      - name: Test 4 - click blue item using measured coordinates
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          : > "$HOME/action.log"
          xsetroot -solid '#000000'
          sleep 0.5

          ./screenshot.sh 05_reset_black

          # Open menu
          xdotool mousemove --sync 640 400
          xdotool click 3
          sleep 0.8

          # Measured second visible item center ~= (704,426)
          xdotool mousemove --sync 704 426
          sleep 0.1
          xdotool mousedown 1
          sleep 0.08
          xdotool mouseup 1
          sleep 1

          ./screenshot.sh 06_after_blue_click

          {
            echo "=== action.log ==="
            cat "$HOME/action.log" || true
          } > artifacts/06_blue_action_log.txt

      - name: Compare pixels
        run: |
          set -euxo pipefail

          {
            echo "=== baseline center pixel ==="
            cat artifacts/01_baseline.center-pixel.txt || true
            echo
            echo "=== menu-opened center pixel ==="
            cat artifacts/03_menu_opened.center-pixel.txt || true
            echo
            echo "=== reset-black center pixel ==="
            cat artifacts/05_reset_black.center-pixel.txt || true
            echo
            echo "=== after-blue center pixel ==="
            cat artifacts/06_after_blue_click.center-pixel.txt || true
          } | tee artifacts/07_pixel_compare.txt

      - name: Collect debug info
        if: always()
        run: |
          set +e

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          {
            echo "=== xdotool mouse location ==="
            xdotool getmouselocation

            echo
            echo "=== visible windows ==="
            xdotool search --onlyvisible --name ".*" getwindowname %@

            echo
            echo "=== processes ==="
            ps aux | grep -E 'openbox|Xvfb|xdotool' | grep -v grep

            echo
            echo "=== rc.xml ==="
            cat "$HOME/.config/openbox/rc.xml"

            echo
            echo "=== menu.xml ==="
            cat "$HOME/.config/openbox/menu.xml"

            echo
            echo "=== action.log ==="
            cat "$HOME/action.log" || true

            echo
            echo "=== xvfb.log ==="
            cat xvfb.log

            echo
            echo "=== openbox.log ==="
            cat openbox.log
          } > artifacts/debug.txt 2>&1

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openbox-input-diagnostics-fixed-v3
          path: artifacts/
