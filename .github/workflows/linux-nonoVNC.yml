name: Remote Linux Image Stream

on:
  workflow_dispatch:

jobs:
  remote-linux-image:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      DISPLAY: ":0"
      XAUTHORITY: "/tmp/xvfb.auth"

    steps:
      - name: Install desktop and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xfce4 \
            xfce4-goodies \
            dbus-x11 \
            xvfb \
            xauth \
            x11-utils \
            x11-xserver-utils \
            xdotool \
            scrot \
            imagemagick \
            wget \
            curl \
            python3

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          cloudflared --version

      - name: Start virtual display with shared XAUTHORITY
        run: |
          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          rm -f "$XAUTHORITY"
          touch "$XAUTHORITY"

          COOKIE=$(mcookie)
          xauth -f "$XAUTHORITY" add :0 . "$COOKIE"
          xauth -f "$XAUTHORITY" add localhost:0 . "$COOKIE"

          Xvfb :0 \
            -screen 0 1280x800x24 \
            -auth "$XAUTHORITY" \
            +extension XTEST \
            +extension RANDR \
            > xvfb.log 2>&1 &

          sleep 3

          echo "DISPLAY=:0" >> "$GITHUB_ENV"
          echo "XAUTHORITY=/tmp/xvfb.auth" >> "$GITHUB_ENV"

          echo "Xvfb log:"
          cat xvfb.log || true

          echo "X authority:"
          xauth -f "$XAUTHORITY" list || true

          echo "XTEST check:"
          xdpyinfo | grep -i xtest || true

          echo "Mouse check:"
          xdotool getmouselocation || true

      - name: Start XFCE desktop only
        run: |
          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          dbus-launch --exit-with-session startxfce4 > xfce.log 2>&1 &

          sleep 18

          echo "XFCE log:"
          cat xfce.log || true

          echo "Processes:"
          ps aux | grep -E "xfce|xfwm|xfdesktop|xfsettings|Xvfb" | grep -v grep || true

          echo "Visible windows:"
          xdotool search --onlyvisible --name ".*" getwindowname %@ 2>/dev/null || true

          echo "Desktop windows:"
          xdotool search --class xfdesktop getwindowname %@ 2>/dev/null || true

          echo "Mouse location:"
          xdotool getmouselocation || true

          echo "Move mouse self-test:"
          xdotool mousemove --sync 640 400
          xdotool getmouselocation || true

      - name: Create stream folder
        run: |
          mkdir -p stream

      - name: Start screenshot loop
        run: |
          cat > screenshot.sh << 'EOF'
          #!/usr/bin/env bash

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          while true
          do
            scrot stream/raw.png 2>/dev/null || true

            if [ -f stream/raw.png ]; then
              convert stream/raw.png \
                -quality 70 \
                stream/latest.jpg 2>/dev/null || true
            fi

            sleep 0.20
          done
          EOF

          chmod +x screenshot.sh
          nohup ./screenshot.sh > screenshot.log 2>&1 &

      - name: Create webpage
        run: |
          cat > stream/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Remote Linux Image Stream</title>

            <style>
              html, body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: black;
                font-family: sans-serif;
              }

              #screen {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: auto;
                height: auto;
                max-width: calc(100vw - 120px);
                max-height: 100vh;
                object-fit: contain;
                cursor: crosshair;
                user-select: none;
                -webkit-user-select: none;
                touch-action: none;
              }

              #sidebar {
                position: fixed;
                top: 0;
                right: 0;
                width: 120px;
                height: 100vh;
                background: #111;
                border-left: 1px solid #333;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding-top: 10px;
                box-sizing: border-box;
                z-index: 9999;
              }

              .btn {
                width: 95px;
                height: 32px;
                margin-bottom: 7px;
                border: none;
                border-radius: 8px;
                background: #222;
                color: white;
                cursor: pointer;
                font-size: 12px;
              }

              .btn.active {
                background: #0066ff;
              }

              #slider {
                writing-mode: vertical-lr;
                direction: rtl;
                width: 30px;
                height: 170px;
                margin-top: 12px;
              }

              #value {
                color: white;
                margin-top: 8px;
                font-size: 12px;
              }

              #status,
              #last {
                color: #aaa;
                margin-top: 8px;
                font-size: 11px;
                text-align: center;
                width: 105px;
                overflow-wrap: break-word;
              }

              #last {
                color: #7dff7d;
              }
            </style>
          </head>

          <body>
            <img id="screen" draggable="false">

            <div id="sidebar">
              <button class="btn" id="ctrl">CTRL</button>
              <button class="btn" id="alt">ALT</button>
              <button class="btn" id="shift">SHIFT</button>
              <button class="btn" id="super">SUPER</button>

              <button class="btn" id="enter">ENTER</button>
              <button class="btn" id="tab">TAB</button>
              <button class="btn" id="esc">ESC</button>
              <button class="btn" id="bksp">BKSP</button>

              <input
                id="slider"
                type="range"
                min="50"
                max="1000"
                value="200"
                step="10"
              >

              <div id="value">200ms</div>
              <div id="status">image HTTP</div>
              <div id="last">no input yet</div>
            </div>

            <script>
              const screen = document.getElementById("screen");
              const slider = document.getElementById("slider");
              const value = document.getElementById("value");
              const statusBox = document.getElementById("status");
              const lastBox = document.getElementById("last");

              let loading = false;
              let refreshInterval = 200;
              let refreshTimer;

              let remoteWidth = 1280;
              let remoteHeight = 800;

              let pointerIsDown = false;
              let pointerButton = 0;

              const held = new Set();

              async function send(path) {
                lastBox.innerText = path;

                try {
                  const response = await fetch(path, {
                    method: "GET",
                    cache: "no-store"
                  });

                  if (!response.ok) {
                    lastBox.innerText = "HTTP " + response.status;
                  }
                } catch (e) {
                  lastBox.innerText = "fetch failed";
                }
              }

              async function refresh() {
                if (loading) return;
                loading = true;

                try {
                  const response = await fetch(
                    "latest.jpg?t=" + Date.now(),
                    { cache: "no-store" }
                  );

                  const blob = await response.blob();
                  const bitmap = await createImageBitmap(blob);

                  remoteWidth = bitmap.width;
                  remoteHeight = bitmap.height;

                  const url = URL.createObjectURL(blob);
                  const old = screen.src;

                  screen.src = url;

                  if (old && old.startsWith("blob:")) {
                    URL.revokeObjectURL(old);
                  }

                  statusBox.innerText = remoteWidth + "x" + remoteHeight;
                } catch (e) {
                  statusBox.innerText = "waiting...";
                }

                loading = false;
              }

              function startLoop() {
                if (refreshTimer) {
                  clearInterval(refreshTimer);
                }

                refreshTimer = setInterval(refresh, refreshInterval);
              }

              slider.addEventListener("input", () => {
                refreshInterval = Number(slider.value);
                value.innerText = refreshInterval + "ms";
                startLoop();
              });

              function coords(e) {
                const rect = screen.getBoundingClientRect();

                const relX = (e.clientX - rect.left) / rect.width;
                const relY = (e.clientY - rect.top) / rect.height;

                return {
                  x: Math.max(
                    0,
                    Math.min(remoteWidth - 1, Math.round(relX * remoteWidth))
                  ),
                  y: Math.max(
                    0,
                    Math.min(remoteHeight - 1, Math.round(relY * remoteHeight))
                  ),
                  inside:
                    relX >= 0 &&
                    relX <= 1 &&
                    relY >= 0 &&
                    relY <= 1
                };
              }

              screen.addEventListener("pointerdown", async (e) => {
                e.preventDefault();

                try {
                  screen.setPointerCapture(e.pointerId);
                } catch {}

                const c = coords(e);
                if (!c.inside) return;

                pointerIsDown = true;
                pointerButton = e.button;

                await send(`/mousedown?x=${c.x}&y=${c.y}&button=${e.button}`);
              });

              screen.addEventListener("pointerup", async (e) => {
                e.preventDefault();

                const c = coords(e);
                if (!c.inside) return;

                pointerIsDown = false;

                await send(`/mouseup?x=${c.x}&y=${c.y}&button=${pointerButton}`);
              });

              screen.addEventListener("pointermove", async (e) => {
                const c = coords(e);
                if (!c.inside) return;

                if (pointerIsDown) {
                  await send(`/mousemove?x=${c.x}&y=${c.y}`);
                }
              });

              screen.addEventListener("click", async (e) => {
                e.preventDefault();

                const c = coords(e);
                if (!c.inside) return;

                await send(`/click?x=${c.x}&y=${c.y}&button=${e.button}`);
              });

              screen.addEventListener("contextmenu", async (e) => {
                e.preventDefault();

                const c = coords(e);
                if (!c.inside) return;

                await send(`/click?x=${c.x}&y=${c.y}&button=2`);
              });

              screen.addEventListener(
                "wheel",
                async (e) => {
                  e.preventDefault();

                  const c = coords(e);
                  if (!c.inside) return;

                  const direction = e.deltaY > 0 ? "down" : "up";
                  await send(`/scroll?x=${c.x}&y=${c.y}&direction=${direction}`);
                },
                { passive: false }
              );

              document.addEventListener("keydown", async (e) => {
                if (e.target.tagName === "INPUT") return;

                e.preventDefault();

                if (e.repeat) return;

                await send(`/keydown?key=${encodeURIComponent(e.key)}`);
              });

              document.addEventListener("keyup", async (e) => {
                if (e.target.tagName === "INPUT") return;

                e.preventDefault();

                await send(`/keyup?key=${encodeURIComponent(e.key)}`);
              });

              function toggleButton(id, key) {
                const btn = document.getElementById(id);

                btn.addEventListener("click", async () => {
                  if (held.has(key)) {
                    held.delete(key);
                    btn.classList.remove("active");

                    await send(`/keyup?key=${encodeURIComponent(key)}`);
                  } else {
                    held.add(key);
                    btn.classList.add("active");

                    await send(`/keydown?key=${encodeURIComponent(key)}`);
                  }
                });
              }

              toggleButton("ctrl", "Control");
              toggleButton("alt", "Alt");
              toggleButton("shift", "Shift");
              toggleButton("super", "Meta");

              document.getElementById("enter").onclick = () => {
                send("/press?key=Enter");
              };

              document.getElementById("tab").onclick = () => {
                send("/press?key=Tab");
              };

              document.getElementById("esc").onclick = () => {
                send("/press?key=Escape");
              };

              document.getElementById("bksp").onclick = () => {
                send("/press?key=Backspace");
              };

              startLoop();
              refresh();
            </script>
          </body>
          </html>
          EOF

      - name: Create control server
        run: |
          cat > control.py << 'EOF'
          from http.server import BaseHTTPRequestHandler, HTTPServer
          from socketserver import ThreadingMixIn
          import os
          import urllib.parse
          import subprocess
          import mimetypes

          ROOT = "stream"

          DISPLAY_ENV = dict(os.environ)
          DISPLAY_ENV["DISPLAY"] = ":0"
          DISPLAY_ENV["XAUTHORITY"] = "/tmp/xvfb.auth"

          def run_cmd(args):
              try:
                  print("RUN:", " ".join(args), flush=True)

                  result = subprocess.run(
                      args,
                      env=DISPLAY_ENV,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                      text=True,
                      timeout=8
                  )

                  if result.stdout:
                      print("STDOUT:", result.stdout.strip(), flush=True)

                  if result.stderr:
                      print("STDERR:", result.stderr.strip(), flush=True)

                  print("EXIT:", result.returncode, flush=True)
                  return result.returncode
              except Exception as e:
                  print("ERROR:", repr(e), flush=True)
                  return 1

          def key_to_xdotool(key):
              mapping = {
                  "Enter": "Return",
                  "Backspace": "BackSpace",
                  "Tab": "Tab",
                  "Escape": "Escape",
                  "Esc": "Escape",

                  "ArrowUp": "Up",
                  "ArrowDown": "Down",
                  "ArrowLeft": "Left",
                  "ArrowRight": "Right",

                  "Delete": "Delete",
                  "Insert": "Insert",
                  "Home": "Home",
                  "End": "End",
                  "PageUp": "Page_Up",
                  "PageDown": "Page_Down",

                  "Control": "Control_L",
                  "Alt": "Alt_L",
                  "Shift": "Shift_L",
                  "Meta": "Super_L",

                  " ": "space",
                  "Spacebar": "space"
              }

              return mapping.get(key, key)

          def mouse_button(browser_button):
              # Browser MouseEvent.button:
              # 0 = left
              # 1 = middle
              # 2 = right
              if browser_button == "0":
                  return "1"
              if browser_button == "1":
                  return "2"
              if browser_button == "2":
                  return "3"

              return "1"

          def q(query, name, default="0"):
              return query.get(name, [default])[0]

          def move_mouse(x, y):
              return run_cmd(["xdotool", "mousemove", "--sync", x, y])

          class Handler(BaseHTTPRequestHandler):
              def log_message(self, format, *args):
                  return

              def ok(self, body=b"ok"):
                  self.send_response(200)
                  self.send_header("Cache-Control", "no-store")
                  self.send_header("Content-Type", "text/plain")
                  self.end_headers()
                  self.wfile.write(body)

              def do_GET(self):
                  parsed = urllib.parse.urlparse(self.path)
                  path = parsed.path
                  query = urllib.parse.parse_qs(parsed.query)

                  print("REQ:", self.path, flush=True)

                  if path == "/click":
                      x = q(query, "x")
                      y = q(query, "y")
                      button = q(query, "button", "0")
                      btn = mouse_button(button)

                      move_mouse(x, y)
                      run_cmd(["xdotool", "click", btn])

                      self.ok()
                      return

                  if path == "/mousedown":
                      x = q(query, "x")
                      y = q(query, "y")
                      button = q(query, "button", "0")
                      btn = mouse_button(button)

                      move_mouse(x, y)
                      run_cmd(["xdotool", "mousedown", btn])

                      self.ok()
                      return

                  if path == "/mouseup":
                      x = q(query, "x")
                      y = q(query, "y")
                      button = q(query, "button", "0")
                      btn = mouse_button(button)

                      move_mouse(x, y)
                      run_cmd(["xdotool", "mouseup", btn])

                      self.ok()
                      return

                  if path == "/mousemove":
                      x = q(query, "x")
                      y = q(query, "y")

                      move_mouse(x, y)

                      self.ok()
                      return

                  if path == "/scroll":
                      x = q(query, "x")
                      y = q(query, "y")
                      direction = q(query, "direction", "down")

                      move_mouse(x, y)

                      if direction == "up":
                          run_cmd(["xdotool", "click", "4"])
                      else:
                          run_cmd(["xdotool", "click", "5"])

                      self.ok()
                      return

                  if path == "/keydown":
                      key = q(query, "key", "")

                      if key:
                          if len(key) == 1:
                              run_cmd(["xdotool", "type", "--delay", "0", key])
                          else:
                              run_cmd(["xdotool", "keydown", key_to_xdotool(key)])

                      self.ok()
                      return

                  if path == "/keyup":
                      key = q(query, "key", "")

                      if key:
                          if len(key) != 1:
                              run_cmd(["xdotool", "keyup", key_to_xdotool(key)])

                      self.ok()
                      return

                  if path == "/press":
                      key = q(query, "key", "")

                      if key:
                          run_cmd(["xdotool", "key", key_to_xdotool(key)])

                      self.ok()
                      return

                  if path == "/debug":
                      lines = []

                      def grab(cmd):
                          try:
                              r = subprocess.run(
                                  cmd,
                                  env=DISPLAY_ENV,
                                  stdout=subprocess.PIPE,
                                  stderr=subprocess.STDOUT,
                                  text=True,
                                  timeout=5
                              )
                              return r.stdout
                          except Exception as e:
                              return repr(e)

                      lines.append("DISPLAY=" + DISPLAY_ENV.get("DISPLAY", ""))
                      lines.append("XAUTHORITY=" + DISPLAY_ENV.get("XAUTHORITY", ""))
                      lines.append("")
                      lines.append("xauth:")
                      lines.append(grab(["xauth", "-f", "/tmp/xvfb.auth", "list"]))
                      lines.append("")
                      lines.append("mouse:")
                      lines.append(grab(["xdotool", "getmouselocation"]))
                      lines.append("")
                      lines.append("windows:")
                      lines.append(grab(["xdotool", "search", "--onlyvisible", "--name", ".*", "getwindowname", "%@"]))
                      lines.append("")
                      lines.append("processes:")
                      lines.append(grab(["bash", "-lc", "ps aux | grep -E 'xfce|xfwm|xfdesktop|Xvfb' | grep -v grep"]))

                      self.ok("\n".join(lines).encode())
                      return

                  if path == "/selftest":
                      move_mouse("640", "400")
                      run_cmd(["xdotool", "click", "3"])
                      self.ok(b"selftest sent right-click at 640,400")
                      return

                  if path == "/":
                      path = "/index.html"

                  safe_path = os.path.normpath(path).lstrip("/")
                  file_path = os.path.join(ROOT, safe_path)

                  if os.path.exists(file_path) and os.path.isfile(file_path):
                      self.send_response(200)
                      self.send_header(
                          "Cache-Control",
                          "no-store, no-cache, must-revalidate"
                      )

                      content_type = mimetypes.guess_type(file_path)[0] or "application/octet-stream"
                      self.send_header("Content-Type", content_type)

                      self.end_headers()

                      with open(file_path, "rb") as f:
                          self.wfile.write(f.read())

                      return

                  self.send_response(404)
                  self.end_headers()

          class ThreadedHTTPServer(ThreadingMixIn, HTTPServer):
              daemon_threads = True

          print("Control server running on 0.0.0.0:8080", flush=True)
          print("DISPLAY:", DISPLAY_ENV["DISPLAY"], flush=True)
          print("XAUTHORITY:", DISPLAY_ENV["XAUTHORITY"], flush=True)

          ThreadedHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          EOF

      - name: Start control server
        run: |
          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          nohup python3 control.py > server.log 2>&1 &

          sleep 2

          curl -I http://localhost:8080 || true

          echo "Debug:"
          curl http://localhost:8080/debug || true

          echo ""
          echo "Server log:"
          cat server.log || true

      - name: Start Cloudflare tunnel
        run: |
          cloudflared tunnel \
            --protocol http2 \
            --ha-connections 1 \
            --url http://localhost:8080 \
            > cloudflare.log 2>&1 &

          sleep 15

          echo ""
          echo "================================="
          echo "REMOTE LINUX IMAGE URL"
          echo "================================="

          URL=$(grep -o \
            'https://[-0-9a-z]*\.trycloudflare.com' \
            cloudflare.log \
            | head -n 1)

          echo "$URL"

          echo ""
          echo "Desktop only."
          echo "No browser."
          echo "No terminal."
          echo "No app opened."
          echo ""
          echo "Debug URLs:"
          echo "$URL/debug"
          echo "$URL/selftest"
          echo "================================="

          cat cloudflare.log || true

      - name: Keep alive
        run: |
          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          while true
          do
            echo "alive $(date)"

            echo "Mouse:"
            xdotool getmouselocation || true

            echo "Recent server log:"
            tail -n 40 server.log || true

            echo "Screenshot log:"
            tail -n 10 screenshot.log || true

            sleep 60
          done
