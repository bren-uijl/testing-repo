name: Openbox Input Diagnostics

on:
  workflow_dispatch:

jobs:
  diagnose-openbox-input:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DISPLAY: ":0"
      XAUTHORITY: "/tmp/xvfb.auth"

    steps:
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            xauth \
            x11-utils \
            x11-xserver-utils \
            openbox \
            xdotool \
            scrot \
            imagemagick \
            python3

      - name: Start Xvfb with shared auth
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          rm -f "$XAUTHORITY"
          touch "$XAUTHORITY"

          COOKIE="$(mcookie)"
          xauth -f "$XAUTHORITY" add :0 . "$COOKIE"
          xauth -f "$XAUTHORITY" add localhost:0 . "$COOKIE"

          Xvfb :0 \
            -screen 0 1280x800x24 \
            -auth "$XAUTHORITY" \
            +extension XTEST \
            +extension RANDR \
            -ac \
            > xvfb.log 2>&1 &

          sleep 3

          echo "=== xvfb.log ==="
          cat xvfb.log || true

          echo "=== xauth list ==="
          xauth -f "$XAUTHORITY" list || true

          echo "=== XTEST check ==="
          xdpyinfo | grep -i xtest || true

          echo "=== Initial mouse location ==="
          xdotool getmouselocation || true

      - name: Create valid Openbox config
        run: |
          set -euxo pipefail

          mkdir -p ~/.config/openbox

          cat > ~/.config/openbox/menu.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <openbox_menu xmlns="http://openbox.org/3.4/menu">
            <menu id="root-menu" label="Openbox">
              <item label="Input works">
                <action name="Execute">
                  <command>sh -lc 'echo INPUT_WORKS > "$HOME/input_works.txt"'</command>
                </action>
              </item>
              <separator />
              <item label="Blue background">
                <action name="Execute">
                  <command>sh -lc "xsetroot -solid '#003366'"</command>
                </action>
              </item>
              <item label="Green background">
                <action name="Execute">
                  <command>sh -lc "xsetroot -solid '#006633'"</command>
                </action>
              </item>
              <item label="Red background">
                <action name="Execute">
                  <command>sh -lc "xsetroot -solid '#663300'"</command>
                </action>
              </item>
            </menu>
          </openbox_menu>
          EOF

          cat > ~/.config/openbox/rc.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <openbox_config xmlns="http://openbox.org/3.4/rc">
            <keyboard>
              <keybind key="A-space">
                <action name="ShowMenu">
                  <menu>root-menu</menu>
                </action>
              </keybind>
            </keyboard>

            <mouse>
              <context name="Root">
                <mousebind button="Right" action="Press">
                  <action name="ShowMenu">
                    <menu>root-menu</menu>
                  </action>
                </mousebind>
              </context>
            </mouse>
          </openbox_config>
          EOF

          echo "=== rc.xml ==="
          cat ~/.config/openbox/rc.xml

          echo "=== menu.xml ==="
          cat ~/.config/openbox/menu.xml

      - name: Start Openbox
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          xsetroot -solid '#202020'

          nohup openbox > openbox.log 2>&1 &

          sleep 3

          echo "=== openbox.log ==="
          cat openbox.log || true

          echo "=== openbox process ==="
          ps aux | grep -E '[o]penbox|[X]vfb' || true

      - name: Create screenshot helper
        run: |
          set -euxo pipefail

          mkdir -p artifacts

          cat > screenshot.sh << 'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          name="$1"

          scrot "artifacts/${name}.png"

          echo "Saved artifacts/${name}.png"
          identify "artifacts/${name}.png" || true

          # sample center pixel
          convert "artifacts/${name}.png" \
            -format "%[pixel:p{640,400}]\n" info: \
            > "artifacts/${name}.center-pixel.txt" || true
          EOF

          chmod +x screenshot.sh

      - name: Screenshot baseline
        run: |
          set -euxo pipefail
          ./screenshot.sh 01_baseline

      - name: Self-test 1 - move pointer
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          xdotool mousemove --sync 640 400
          xdotool getmouselocation > artifacts/02_mouse_after_move.txt
          cat artifacts/02_mouse_after_move.txt

          ./screenshot.sh 02_after_move

      - name: Self-test 2 - open root menu with right click
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          xdotool mousemove --sync 640 400
          xdotool click 3

          sleep 1

          ./screenshot.sh 03_menu_opened

      - name: Self-test 3 - select second menu item by keyboard
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          # open menu first
          xdotool mousemove --sync 640 400
          xdotool click 3
          sleep 0.5

          # move from first item ("Input works") to second item ("Blue background")
          xdotool key Down
          xdotool key Return

          sleep 1

          ./screenshot.sh 04_after_select_blue

      - name: Self-test 4 - verify pixel changed
        run: |
          set -euxo pipefail

          echo "=== Center pixel baseline ==="
          cat artifacts/01_baseline.center-pixel.txt || true

          echo "=== Center pixel after blue selection ==="
          cat artifacts/04_after_select_blue.center-pixel.txt || true

      - name: Self-test 5 - select first item and verify command executed
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          rm -f "$HOME/input_works.txt"

          xdotool mousemove --sync 640 400
          xdotool click 3
          sleep 0.5

          # first item is already selected by default
          xdotool key Return
          sleep 0.5

          if [ -f "$HOME/input_works.txt" ]; then
            echo "Input works marker created."
            cat "$HOME/input_works.txt"
          else
            echo "Marker file NOT created." >&2
            exit 1
          fi

      - name: Collect debug info
        if: always()
        run: |
          set +e

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          echo "=== xdotool mouse location ===" > artifacts/debug.txt
          xdotool getmouselocation >> artifacts/debug.txt 2>&1

          echo "" >> artifacts/debug.txt
          echo "=== visible windows ===" >> artifacts/debug.txt
          xdotool search --onlyvisible --name ".*" getwindowname %@ >> artifacts/debug.txt 2>&1 || true

          echo "" >> artifacts/debug.txt
          echo "=== processes ===" >> artifacts/debug.txt
          ps aux | grep -E 'openbox|Xvfb|xdotool' | grep -v grep >> artifacts/debug.txt 2>&1 || true

          echo "" >> artifacts/debug.txt
          echo "=== rc.xml ===" >> artifacts/debug.txt
          cat ~/.config/openbox/rc.xml >> artifacts/debug.txt 2>&1 || true

          echo "" >> artifacts/debug.txt
          echo "=== menu.xml ===" >> artifacts/debug.txt
          cat ~/.config/openbox/menu.xml >> artifacts/debug.txt 2>&1 || true

          echo "" >> artifacts/debug.txt
          echo "=== xvfb.log ===" >> artifacts/debug.txt
          cat xvfb.log >> artifacts/debug.txt 2>&1 || true

          echo "" >> artifacts/debug.txt
          echo "=== openbox.log ===" >> artifacts/debug.txt
          cat openbox.log >> artifacts/debug.txt 2>&1 || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openbox-input-diagnostics
          path: artifacts/
