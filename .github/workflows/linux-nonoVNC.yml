name: Openbox Input Diagnostics Fixed

on:
  workflow_dispatch:

jobs:
  diagnose-openbox-input:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DISPLAY: ":0"
      XAUTHORITY: "/tmp/xvfb.auth"

    steps:
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            xauth \
            x11-utils \
            x11-xserver-utils \
            openbox \
            xdotool \
            scrot \
            imagemagick \
            libxml2-utils \
            python3

      - name: Start Xvfb with shared auth
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          rm -f "$XAUTHORITY"
          touch "$XAUTHORITY"

          COOKIE="$(mcookie)"
          xauth -f "$XAUTHORITY" add :0 . "$COOKIE"
          xauth -f "$XAUTHORITY" add localhost:0 . "$COOKIE"

          Xvfb :0 \
            -screen 0 1280x800x24 \
            -auth "$XAUTHORITY" \
            +extension XTEST \
            +extension RANDR \
            -ac \
            > xvfb.log 2>&1 &

          sleep 3

          echo "=== xvfb.log ==="
          cat xvfb.log || true

          echo "=== xauth list ==="
          xauth -f "$XAUTHORITY" list || true

          echo "=== XTEST check ==="
          xdpyinfo | grep -i xtest || true

          echo "=== Initial mouse location ==="
          xdotool getmouselocation || true

      - name: Create valid Openbox config
        run: |
          set -euxo pipefail

          mkdir -p ~/.config/openbox artifacts

          cat > ~/.config/openbox/menu.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <openbox_menu xmlns="http://openbox.org/3.4/menu">
            <menu id="root-menu" label="Openbox">
              <item label="Write marker file">
                <action name="Execute">
                  <command>sh -lc 'echo INPUT_WORKS > "$HOME/input_works.txt"'</command>
                </action>
              </item>
              <separator />
              <item label="Blue background">
                <action name="Execute">
                  <command>sh -lc "xsetroot -solid '#003366'"</command>
                </action>
              </item>
              <item label="Green background">
                <action name="Execute">
                  <command>sh -lc "xsetroot -solid '#006633'"</command>
                </action>
              </item>
              <item label="Red background">
                <action name="Execute">
                  <command>sh -lc "xsetroot -solid '#663300'"</command>
                </action>
              </item>
            </menu>
          </openbox_menu>
          EOF

          cat > ~/.config/openbox/rc.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <openbox_config xmlns="http://openbox.org/3.4/rc">
            <keyboard>
              <keybind key="A-space">
                <action name="ShowMenu">
                  <menu>root-menu</menu>
                </action>
              </keybind>
            </keyboard>

            <mouse>
              <context name="Root">
                <mousebind button="Right" action="Press">
                  <action name="ShowMenu">
                    <menu>root-menu</menu>
                  </action>
                </mousebind>
              </context>
            </mouse>
          </openbox_config>
          EOF

          echo "=== rc.xml ==="
          cat ~/.config/openbox/rc.xml

          echo "=== menu.xml ==="
          cat ~/.config/openbox/menu.xml

          xmllint --noout ~/.config/openbox/rc.xml
          xmllint --noout ~/.config/openbox/menu.xml

      - name: Start Openbox with explicit config
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          xsetroot -solid '#202020'

          nohup openbox --config-file "$HOME/.config/openbox/rc.xml" > openbox.log 2>&1 &
          sleep 3

          openbox --reconfigure || true
          sleep 1

          echo "=== openbox.log ==="
          cat openbox.log || true

          echo "=== openbox process ==="
          ps aux | grep -E '[o]penbox|[X]vfb' || true

      - name: Create screenshot helper
        run: |
          set -euxo pipefail

          cat > screenshot.sh << 'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          name="$1"

          scrot "artifacts/${name}.png"
          identify "artifacts/${name}.png" || true

          convert "artifacts/${name}.png" \
            -format "%[pixel:p{640,400}]\n" info: \
            > "artifacts/${name}.center-pixel.txt" || true
          EOF

          chmod +x screenshot.sh

      - name: Screenshot baseline
        run: |
          set -euxo pipefail
          ./screenshot.sh 01_baseline

      - name: Self-test 1 - move pointer
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          xdotool mousemove --sync 640 400
          xdotool getmouselocation | tee artifacts/02_mouse_after_move.txt

          ./screenshot.sh 02_after_move

      - name: Self-test 2 - open root menu with right click
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          xdotool mousemove --sync 640 400
          xdotool click 3
          sleep 1

          ./screenshot.sh 03_menu_opened

      - name: Self-test 3 - activate first menu item by keyboard
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          rm -f "$HOME/input_works.txt"

          # Open the menu
          xdotool mousemove --sync 640 400
          xdotool click 3
          sleep 1

          # First item should be selected by default
          xdotool key Return
          sleep 1

          if [ -f "$HOME/input_works.txt" ]; then
            echo "INPUT_WORKS marker created."
            cat "$HOME/input_works.txt" | tee artifacts/04_marker_contents.txt
          else
            echo "Marker file was NOT created." | tee artifacts/04_marker_contents.txt
            exit 1
          fi

          ./screenshot.sh 04_after_marker

      - name: Self-test 4 - activate blue background by keyboard
        run: |
          set -euxo pipefail

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          # Reset to black first
          xsetroot -solid '#000000'
          sleep 1
          ./screenshot.sh 05_reset_black

          # Open menu
          xdotool mousemove --sync 640 400
          xdotool click 3
          sleep 1

          # Go to "Blue background"
          xdotool key Down
          xdotool key Down
          xdotool key Return
          sleep 1

          ./screenshot.sh 06_after_select_blue

      - name: Compare pixels
        run: |
          set -euxo pipefail

          echo "=== baseline center pixel ===" | tee artifacts/07_pixel_compare.txt
          cat artifacts/01_baseline.center-pixel.txt | tee -a artifacts/07_pixel_compare.txt || true

          echo "" | tee -a artifacts/07_pixel_compare.txt
          echo "=== menu-opened center pixel ===" | tee -a artifacts/07_pixel_compare.txt
          cat artifacts/03_menu_opened.center-pixel.txt | tee -a artifacts/07_pixel_compare.txt || true

          echo "" | tee -a artifacts/07_pixel_compare.txt
          echo "=== reset-black center pixel ===" | tee -a artifacts/07_pixel_compare.txt
          cat artifacts/05_reset_black.center-pixel.txt | tee -a artifacts/07_pixel_compare.txt || true

          echo "" | tee -a artifacts/07_pixel_compare.txt
          echo "=== after-blue center pixel ===" | tee -a artifacts/07_pixel_compare.txt
          cat artifacts/06_after_select_blue.center-pixel.txt | tee -a artifacts/07_pixel_compare.txt || true

      - name: Collect debug info
        if: always()
        run: |
          set +e

          export DISPLAY=:0
          export XAUTHORITY=/tmp/xvfb.auth

          {
            echo "=== xdotool mouse location ==="
            xdotool getmouselocation

            echo
            echo "=== visible windows ==="
            xdotool search --onlyvisible --name ".*" getwindowname %@

            echo
            echo "=== processes ==="
            ps aux | grep -E 'openbox|Xvfb|xdotool' | grep -v grep

            echo
            echo "=== rc.xml ==="
            cat ~/.config/openbox/rc.xml

            echo
            echo "=== menu.xml ==="
            cat ~/.config/openbox/menu.xml

            echo
            echo "=== xvfb.log ==="
            cat xvfb.log

            echo
            echo "=== openbox.log ==="
            cat openbox.log
          } > artifacts/debug.txt 2>&1

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openbox-input-diagnostics-fixed
          path: artifacts/
