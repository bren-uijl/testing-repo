name: File Share (Tunnel)

on:
  workflow_dispatch:

jobs:
  share:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y curl python3

      - name: Download file (direct link)
        run: |
          curl -L -o file.rar "https://files06.tchspt.com/down/macOSTransformationPack5.0.rar"
          echo "Downloaded:"
          ls -lh
          file file.rar || true

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

      - name: Start server + tunnel
        run: |
          # Start local file server
          python3 -m http.server 8080 &
          sleep 3

          echo "Starting Cloudflare tunnel..."

          URL=""

          # Retry tunnel (fixes 500 error problem)
          for i in {1..5}; do
            ./cloudflared tunnel --url http://localhost:8080 --no-autoupdate > cf.log 2>&1 &
            sleep 8

            URL=$(grep -o 'https://[-a-z0-9]*\.trycloudflare.com' cf.log | head -n 1 || true)

            if [ ! -z "$URL" ]; then
              echo "======================================"
              echo "✅ DOWNLOAD LINK:"
              echo "$URL/file.rar"
              echo "======================================"
              break
            fi

            echo "❌ Attempt $i failed, retrying..."
            killall cloudflared || true
            sleep 3
          done

          # If still failed → show debug
          if [ -z "$URL" ]; then
            echo "❌ Tunnel failed completely"
            echo "===== DEBUG LOG ====="
            cat cf.log
            echo "====================="
          fi

          # Keepalive loop (prevents workflow exit)
          echo "Keepalive started..."
          while true; do
            echo "alive $(date)"
            sleep 60
          done
