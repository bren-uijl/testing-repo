- name: Start tunnel
  run: |
    python3 -m http.server 8080 &
    sleep 3

    echo "Starting tunnel..."

    for i in {1..5}; do
      ./cloudflared tunnel --url http://localhost:8080 > cf.log 2>&1 &
      sleep 8

      URL=$(grep -o 'https://[-a-z0-9]*\.trycloudflare.com' cf.log | head -n 1 || true)

      if [ ! -z "$URL" ]; then
        echo "✅ DOWNLOAD LINK:"
        echo "$URL/file.rar"
        break
      fi

      echo "Retry $i failed"
      killall cloudflared || true
      sleep 3
    done

    if [ -z "$URL" ]; then
      echo "❌ Tunnel completely failed"
      cat cf.log
    fi

    while true; do
      echo "alive $(date)"
      sleep 60
    done
