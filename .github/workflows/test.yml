name: Download + Share File (Stable)

on:
  workflow_dispatch

jobs:
  share:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y curl python3

      - name: Download file
        run: |
          curl -L -o file.exe "https://www.techspot.com/downloads/downloadnowfile/6263/?evp=ade18730bca83a75dc399311646f81ff&file=7608"
          echo "Downloaded file:"
          ls -lh

      - name: Install Cloudflare tunnel
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

      - name: Start server and tunnel
        run: |
          # Start HTTP server
          python3 -m http.server 8080 &
          sleep 2

          # Start Cloudflare tunnel
          ./cloudflared tunnel --url http://localhost:8080 > cf.log 2>&1 &

          echo "Waiting for Cloudflare URL..."

          # Retry loop to get URL (prevents crash)
          for i in {1..30}; do
            URL=$(grep -o 'https://[-a-z0-9]*\.trycloudflare.com' cf.log | head -n 1 || true)

            if [ ! -z "$URL" ]; then
              echo "======================================"
              echo "✅ YOUR DOWNLOAD LINK:"
              echo "$URL/file.exe"
              echo "======================================"
              break
            fi

            sleep 3
          done

          # If URL not found, show logs
          if [ -z "$URL" ]; then
            echo "❌ Tunnel failed. Dumping logs:"
            cat cf.log
          fi

          # Keepalive loop (prevents workflow exit)
          echo "Keepalive started..."
          while true; do
            sleep 60
          done
``
