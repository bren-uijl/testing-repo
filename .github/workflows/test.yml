name: Ollama Gemma Manual Run

on:
  workflow_dispatch:

jobs:
  run-gemma:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ollama
        run: |
          curl -L https://ollama.com/download/ollama-darwin -o ollama
          chmod +x ollama
          sudo mv ollama /usr/local/bin/ollama

          ollama --version

      - name: Start Ollama Server
        run: |
          nohup ollama serve > ollama.log 2>&1 &

          echo "Waiting for Ollama server..."

          for i in {1..30}; do
            if curl -s http://127.0.0.1:11434/api/tags > /dev/null; then
              echo "Ollama is ready"
              break
            fi
            sleep 2
          done

      - name: Pull Gemma 3 1B
        run: |
          ollama pull gemma3:1b

      - name: Run Prompt and Save Response
        run: |
          mkdir -p responses

          TIMESTAMP=$(date +"%m%d%H%M%S")
          OUTPUT_FILE="responses/${TIMESTAMP}.md"

          PROMPT="Explain GitHub Actions in one short paragraph."

          RESPONSE=$(ollama run gemma3:1b "$PROMPT")

          {
            echo "# Prompt"
            echo
            echo "$PROMPT"
            echo
            echo "# Response"
            echo
            echo "$RESPONSE"
          } > "$OUTPUT_FILE"

          echo "Created $OUTPUT_FILE"

      - name: Upload Responses
        uses: actions/upload-artifact@v4
        with:
          name: responses
          path: responses/
