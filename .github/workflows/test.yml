name: Ollama Gemma Manual Run

on:
  workflow_dispatch:

jobs:
  tree:
    runs-on: ubuntu-latest

    steps:
      - name: "checkout"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          persist-credentials: true
          fetch-depth: 0

      - name: "tree"
        run: tree
