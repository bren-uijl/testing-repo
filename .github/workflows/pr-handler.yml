name: OpenCode PR Auto Fixer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  opencode:
    # ✅ Prevent infinite loops from bot commits
    if: |
      github.actor != 'github-actions[bot]' &&
      github.actor != 'opencode-agent[bot]'

    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      MODEL: "opencode/qwen3.6-plus-free"

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}   # ✅ checkout PR branch directly
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git jq

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Configure git bot
        run: |
          git config user.name "opencode-agent[bot]"
          git config user.email "opencode-agent@users.noreply.github.com"

      - name: Run OpenCode (PR fixer mode)
        run: |
          SYSTEM_PROMPT="You are an AI code reviewer that FIXES pull requests.

          CONTEXT:
          You are running inside an active Pull Request branch.

          YOUR JOB:
          - Review the PR changes
          - Fix bugs or mistakes
          - Improve code quality
          - Keep changes SMALL and SAFE
          - Only modify files related to this PR

          STRICT RULES:
          - DO NOT create new branches
          - DO NOT create new PRs
          - ONLY commit to the current PR branch
          - ALWAYS commit after each change
          - Use conventional commit messages
          - NEVER break existing functionality

          BEHAVIOR:
          - Think like a senior reviewer who also fixes things
          - Stay strictly within PR scope
          - Avoid large rewrites
          - Prioritize correctness and clarity"

          opencode run "$SYSTEM_PROMPT" \
            --model "$MODEL" \
            --thinking \
            --dangerously-skip-permissions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Final commit (if needed)
        run: |
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add -A
            git commit -m "fix(opencode): improve PR changes"
          else
            echo "No changes to commit"
          fi

      - name: Push fixes to PR
        run: |
          git push origin HEAD:${{ github.head_ref }}

      - name: Summary
        if: always()
        run: |
          echo "=== Updated PR commits ==="
          git log --oneline -10 || true
