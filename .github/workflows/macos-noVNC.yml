name: Remote macOS noVNC

on:
  workflow_dispatch:

jobs:
  remote-macos:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:

      - name: Install dependencies
        run: |
          brew install cloudflared

          python3 -m pip install \
            --break-system-packages \
            websockify

      - name: Download noVNC
        run: |
          git clone https://github.com/novnc/noVNC.git

      - name: Prevent sleep
        run: |
          caffeinate -dimsu &
          open -a Finder
          sleep 5

      - name: Open Safari
        run: |
          open -a Safari "https://apple.com"
          sleep 5

      - name: Enable macOS VNC
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure \
            -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -restart \
            -agent \
            -privs -all

      - name: Check VNC server
        run: |
          sleep 5

          echo "Checking VNC server..."

          lsof -i :5900 || true

          nc -zv localhost 5900 || true

      - name: Start noVNC
        run: |
          nohup python3 -m websockify \
            --web noVNC \
            6080 \
            localhost:5900 \
            > novnc.log 2>&1 &

          sleep 5

          cat novnc.log || true

      - name: Verify noVNC
        run: |
          curl http://localhost:6080/vnc.html || true

      - name: Start Cloudflare tunnel
        run: |
          nohup cloudflared tunnel \
            --protocol http2 \
            --ha-connections 1 \
            --url http://localhost:6080 \
            > cloudflare.log 2>&1 &

          sleep 15

          echo ""
          echo "================================="
          echo "REMOTE MAC URL"
          echo "================================="

          URL=$(grep -o \
            'https://[-0-9a-z]*\.trycloudflare.com' \
            cloudflare.log \
            | head -n 1)

          echo "$URL/vnc.html"

          echo "================================="

      - name: Keep runner alive
        run: |
          while true
          do
            echo "alive $(date)"
            sleep 60
          done
