name: Remote Linux noVNC

on:
  workflow_dispatch:

jobs:
  remote-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install desktop and tools
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            xfce4 \
            xfce4-goodies \
            x11vnc \
            xvfb \
            novnc \
            websockify \
            wget \
            curl

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          cloudflared --version

      - name: Start virtual display
        run: |
          Xvfb :0 -screen 0 1280x800x24 &
          echo "DISPLAY=:0" >> $GITHUB_ENV
          sleep 2

      - name: Start desktop
        run: |
          export DISPLAY=:0
          startxfce4 &
          sleep 5

      - name: Start VNC server without password
        run: |
          export DISPLAY=:0

          x11vnc \
            -display :0 \
            -nopw \
            -forever \
            -shared \
            -rfbport 5900 \
            > x11vnc.log 2>&1 &

          sleep 3
          cat x11vnc.log || true

      - name: Start noVNC
        run: |
          websockify \
            --web /usr/share/novnc/ \
            6080 \
            localhost:5900 \
            > novnc.log 2>&1 &

          sleep 3
          cat novnc.log || true

      - name: Check services
        run: |
          echo "Checking VNC..."
          nc -zv localhost 5900 || true

          echo "Checking noVNC..."
          curl -I http://localhost:6080/vnc.html || true

      - name: Start Cloudflare tunnel
        run: |
          cloudflared tunnel \
            --protocol http2 \
            --ha-connections 1 \
            --url http://localhost:6080 \
            > cloudflare.log 2>&1 &

          sleep 15

          echo ""
          echo "================================="
          echo "REMOTE LINUX URL"
          echo "================================="

          URL=$(grep -o \
            'https://[-0-9a-z]*\.trycloudflare.com' \
            cloudflare.log \
            | head -n 1)

          echo "$URL/vnc.html"

          echo ""
          echo "NO USERNAME"
          echo "NO PASSWORD"

          echo "================================="

          cat cloudflare.log || true

      - name: Keep alive
        run: |
          while true
          do
            echo "alive $(date)"
            sleep 60
          done
