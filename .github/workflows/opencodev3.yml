name: OpenCode Auto Run v2

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "What should OpenCode do? Be specific for best results."
        required: true
        default: "Inspect this project and improve it where useful."
      branch:
        description: "Branch to run on"
        required: true
        default: "main"
      model:
        description: "AI model to use"
        required: false
        default: "opencode/qwen3.6-plus-free"
      working_directory:
        description: "Subdirectory to work in (leave empty for repo root)"
        required: false
        default: ""

permissions: write-all

jobs:
  opencode:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      DISPLAY: ":99"
      STREAM_PORT: "8765"
      SCREEN_WIDTH: "1280"
      SCREEN_HEIGHT: "900"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Install Linux GUI, automation, and stream dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            fluxbox \
            xdotool \
            scrot \
            imagemagick \
            curl \
            wget \
            jq \
            python3 \
            python3-pip

          python3 -m pip install --user aiohttp

      - name: Start virtual Linux desktop
        run: |
          Xvfb :99 -screen 0 ${SCREEN_WIDTH}x${SCREEN_HEIGHT}x24 > /tmp/xvfb.log 2>&1 &
          sleep 2

          fluxbox > /tmp/fluxbox.log 2>&1 &
          sleep 2

          xdpyinfo -display :99 >/dev/null

      - name: Create WebSocket image and terminal streaming server
        run: |
          cat > /tmp/ws_stream.py <<'PY'
          import asyncio
          import base64
          import json
          import os
          import subprocess
          from aiohttp import web

          DISPLAY = os.environ.get("DISPLAY", ":99")
          STREAM_PORT = int(os.environ.get("STREAM_PORT", "8765"))
          SCREEN_WIDTH = int(os.environ.get("SCREEN_WIDTH", "1280"))
          SCREEN_HEIGHT = int(os.environ.get("SCREEN_HEIGHT", "900"))

          SCREENSHOT_PATH = "/tmp/ws-screen.png"
          OPENCODE_LOG_PATH = "/tmp/opencode-output.log"

          INDEX_HTML = f"""
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8" />
            <title>OpenCode Live UI + Terminal</title>
            <style>
              html, body {{
                margin: 0;
                padding: 0;
                background: #111;
                color: #eee;
                font-family: Arial, sans-serif;
                overflow: auto;
              }}

              #bar {{
                padding: 8px 12px;
                background: #222;
                position: sticky;
                top: 0;
                z-index: 10;
                border-bottom: 1px solid #333;
              }}

              #layout {{
                display: flex;
                align-items: flex-start;
                gap: 12px;
                padding: 12px;
              }}

              #screen-wrap {{
                flex: 0 0 auto;
                background: #000;
                border: 1px solid #444;
                width: {SCREEN_WIDTH}px;
                height: {SCREEN_HEIGHT}px;
                overflow: hidden;
              }}

              #screen {{
                display: block;
                width: {SCREEN_WIDTH}px;
                height: {SCREEN_HEIGHT}px;
                max-width: none;
                max-height: none;
                object-fit: none;
                image-rendering: auto;
                cursor: crosshair;
              }}

              #terminal-wrap {{
                flex: 0 0 700px;
                height: {SCREEN_HEIGHT}px;
                background: #050505;
                border: 1px solid #444;
                overflow: hidden;
                display: flex;
                flex-direction: column;
              }}

              #terminal-title {{
                padding: 8px;
                background: #181818;
                border-bottom: 1px solid #333;
                font-weight: bold;
              }}

              #terminal {{
                margin: 0;
                padding: 10px;
                flex: 1;
                overflow: auto;
                white-space: pre-wrap;
                word-break: break-word;
                font-family: Consolas, Monaco, monospace;
                font-size: 13px;
                line-height: 1.35;
                color: #d8d8d8;
              }}

              .small {{
                color: #aaa;
                font-size: 12px;
              }}

              .ok {{
                color: #7CFC98;
              }}

              .bad {{
                color: #ff7070;
              }}
            </style>
          </head>
          <body>
            <div id="bar">
              <strong>OpenCode Live View</strong>
              <span id="status" class="small">connecting...</span>
              <span class="small">
                — GUI is 1:1 at {SCREEN_WIDTH}x{SCREEN_HEIGHT}
                — click GUI to send mouse clicks
                — arrow keys, Enter, Escape, Backspace and Tab are forwarded
              </span>
            </div>

            <div id="layout">
              <div id="screen-wrap">
                <img id="screen" />
              </div>

              <div id="terminal-wrap">
                <div id="terminal-title">OpenCode terminal output</div>
                <pre id="terminal">Waiting for OpenCode output...</pre>
              </div>
            </div>

            <script>
              const img = document.getElementById("screen");
              const terminal = document.getElementById("terminal");
              const statusEl = document.getElementById("status");

              const proto = location.protocol === "https:" ? "wss:" : "ws:";
              const ws = new WebSocket(`${{proto}}//${{location.host}}/ws`);

              let userScrolledTerminal = false;

              terminal.addEventListener("scroll", () => {{
                const nearBottom =
                  terminal.scrollHeight - terminal.scrollTop - terminal.clientHeight < 40;
                userScrolledTerminal = !nearBottom;
              }});

              ws.onopen = () => {{
                statusEl.textContent = "connected";
                statusEl.className = "small ok";
              }};

              ws.onclose = () => {{
                statusEl.textContent = "disconnected";
                statusEl.className = "small bad";
              }};

              ws.onerror = () => {{
                statusEl.textContent = "error";
                statusEl.className = "small bad";
              }};

              ws.onmessage = (event) => {{
                const msg = JSON.parse(event.data);

                if (msg.type === "frame") {{
                  img.dataset.width = msg.width;
                  img.dataset.height = msg.height;
                  img.src = "data:image/png;base64," + msg.data;
                }}

                if (msg.type === "terminal") {{
                  terminal.textContent = msg.text || "Waiting for OpenCode output...";

                  if (!userScrolledTerminal) {{
                    terminal.scrollTop = terminal.scrollHeight;
                  }}
                }}
              }};

              img.addEventListener("click", (event) => {{
                const rect = img.getBoundingClientRect();

                const naturalWidth = Number(img.dataset.width || {SCREEN_WIDTH});
                const naturalHeight = Number(img.dataset.height || {SCREEN_HEIGHT});

                const x = Math.round((event.clientX - rect.left) * naturalWidth / rect.width);
                const y = Math.round((event.clientY - rect.top) * naturalHeight / rect.height);

                ws.send(JSON.stringify({{
                  type: "click",
                  x,
                  y
                }}));
              }});

              window.addEventListener("keydown", (event) => {{
                const allowed = [
                  "ArrowUp",
                  "ArrowDown",
                  "ArrowLeft",
                  "ArrowRight",
                  "Enter",
                  "Escape",
                  "Backspace",
                  "Tab",
                  " "
                ];

                if (!allowed.includes(event.key)) {{
                  return;
                }}

                event.preventDefault();

                ws.send(JSON.stringify({{
                  type: "key",
                  key: event.key
                }}));
              }});
            </script>
          </body>
          </html>
          """

          def run_cmd(args):
              env = os.environ.copy()
              env["DISPLAY"] = DISPLAY

              return subprocess.run(
                  args,
                  env=env,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
              )

          def read_terminal_log():
              if not os.path.exists(OPENCODE_LOG_PATH):
                  return "Waiting for OpenCode output..."

              try:
                  with open(OPENCODE_LOG_PATH, "rb") as f:
                      f.seek(0, os.SEEK_END)
                      size = f.tell()
                      f.seek(max(size - 60000, 0), os.SEEK_SET)
                      data = f.read().decode("utf-8", errors="replace")
                      return data
              except Exception as e:
                  return f"Could not read OpenCode log: {e}"

          def take_screenshot_frame():
              result = run_cmd(["scrot", SCREENSHOT_PATH])

              if result.returncode != 0:
                  error_text = result.stderr or result.stdout or "Unknown screenshot error"
                  return {
                      "type": "terminal",
                      "text": f"Screenshot failed: {error_text}",
                  }

              with open(SCREENSHOT_PATH, "rb") as f:
                  data = base64.b64encode(f.read()).decode("ascii")

              return {
                  "type": "frame",
                  "width": SCREEN_WIDTH,
                  "height": SCREEN_HEIGHT,
                  "data": data,
              }

          async def index(request):
              return web.Response(
                  text=INDEX_HTML,
                  content_type="text/html",
              )

          async def websocket_handler(request):
              ws = web.WebSocketResponse()
              await ws.prepare(request)

              async def sender():
                  counter = 0

                  while not ws.closed:
                      frame = take_screenshot_frame()
                      await ws.send_str(json.dumps(frame))

                      if counter % 2 == 0:
                          await ws.send_str(json.dumps({
                              "type": "terminal",
                              "text": read_terminal_log(),
                          }))

                      counter += 1
                      await asyncio.sleep(0.5)

              sender_task = asyncio.create_task(sender())

              try:
                  async for msg in ws:
                      if msg.type != web.WSMsgType.TEXT:
                          continue

                      try:
                          data = json.loads(msg.data)
                      except Exception:
                          continue

                      if data.get("type") == "click":
                          x = str(int(data.get("x", 0)))
                          y = str(int(data.get("y", 0)))
                          run_cmd(["xdotool", "mousemove", x, y, "click", "1"])

                      if data.get("type") == "key":
                          key = str(data.get("key", ""))

                          key_map = {
                              "ArrowUp": "Up",
                              "ArrowDown": "Down",
                              "ArrowLeft": "Left",
                              "ArrowRight": "Right",
                              "Enter": "Return",
                              "Escape": "Escape",
                              "Backspace": "BackSpace",
                              "Tab": "Tab",
                              " ": "space",
                          }

                          mapped = key_map.get(key)

                          if mapped:
                              run_cmd(["xdotool", "key", mapped])
              finally:
                  sender_task.cancel()

              return ws

          async def health(request):
              return web.Response(text="ok\n")

          app = web.Application()
          app.router.add_get("/", index)
          app.router.add_get("/index.html", index)
          app.router.add_get("/ws", websocket_handler)
          app.router.add_get("/health", health)

          if __name__ == "__main__":
              web.run_app(app, host="0.0.0.0", port=STREAM_PORT)
          PY

      - name: Start WebSocket image and terminal stream
        run: |
          touch /tmp/opencode-output.log

          python3 /tmp/ws_stream.py > /tmp/ws-stream.log 2>&1 &
          sleep 3

          curl -f http://localhost:${STREAM_PORT}/health

      - name: Install cloudflared
        run: |
          wget -q -O cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: Start Cloudflare tunnel to image stream
        run: |
          cloudflared tunnel --url http://localhost:${STREAM_PORT} --no-autoupdate > /tmp/cloudflared.log 2>&1 &

          for i in {1..60}; do
            URL="$(grep -o 'https://[-a-z0-9.]*trycloudflare.com' /tmp/cloudflared.log | head -n 1 || true)"

            if [ -n "$URL" ]; then
              echo "STREAM_URL=$URL" >> "$GITHUB_ENV"
              echo "::notice title=Live OpenCode UI + Terminal::$URL"
              exit 0
            fi

            sleep 2
          done

          echo "Cloudflare tunnel did not start correctly."
          cat /tmp/cloudflared.log
          exit 1

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Create UI helper commands for OpenCode
        run: |
          cat > /tmp/ui <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          export DISPLAY="${DISPLAY:-:99}"

          case "${1:-}" in
            screenshot)
              scrot /tmp/ui-screenshot.png
              echo "/tmp/ui-screenshot.png"
              ;;

            click)
              xdotool mousemove "$2" "$3" click 1
              ;;

            rightclick)
              xdotool mousemove "$2" "$3" click 3
              ;;

            doubleclick)
              xdotool mousemove "$2" "$3" click --repeat 2 --delay 100 1
              ;;

            key)
              xdotool key "$2"
              ;;

            type)
              shift
              xdotool type --delay 20 "$*"
              ;;

            mousemove)
              xdotool mousemove "$2" "$3"
              ;;

            window-list)
              xdotool search --onlyvisible --name ".*" getwindowname %@ || true
              ;;

            *)
              echo "Usage:"
              echo "  ui screenshot"
              echo "  ui click X Y"
              echo "  ui rightclick X Y"
              echo "  ui doubleclick X Y"
              echo "  ui key KEY"
              echo "  ui type TEXT"
              echo "  ui mousemove X Y"
              echo "  ui window-list"
              exit 1
              ;;
          esac
          EOF

          chmod +x /tmp/ui
          sudo ln -sf /tmp/ui /usr/local/bin/ui

      - name: Run OpenCode with GUI access
        working-directory: ${{ github.workspace }}/${{ inputs.working_directory }}
        run: |
          echo "Live side-by-side UI and terminal stream:"
          echo "$STREAM_URL"

          touch /tmp/opencode-output.log

          {
            echo "OpenCode starting..."
            echo "Stream URL: $STREAM_URL"
            echo "Working directory: $(pwd)"
            echo "Model: ${{ inputs.model }}"
            echo "Display: $DISPLAY"
            echo "Screen: ${SCREEN_WIDTH}x${SCREEN_HEIGHT}"
            echo ""
          } | tee -a /tmp/opencode-output.log

          opencode run --model "${{ inputs.model }}" "$(cat <<'PROMPT'
          ${{ inputs.prompt }}

          You are running in GitHub Actions on Linux with a virtual desktop.

          The desktop is available on DISPLAY=:99.

          The GUI stream is 1:1 pixel size.

          You can control the UI with these shell commands:
          - ui screenshot
          - ui click X Y
          - ui rightclick X Y
          - ui doubleclick X Y
          - ui key KEY
          - ui type TEXT
          - ui mousemove X Y
          - ui window-list

          Use screenshots before clicking.
          If you need to launch a GUI app, launch it with DISPLAY=:99.
          )" 2>&1 | tee -a /tmp/opencode-output.log

      - name: Upload UI logs and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-debug
          path: |
            /tmp/*.log
            /tmp/ui-screenshot.png
            /tmp/ws-screen.png
            /tmp/opencode-output.log
