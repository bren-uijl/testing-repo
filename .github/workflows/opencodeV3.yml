name: OpenCode Auto Run v3

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "What should OpenCode do? Be specific for best results."
        required: true
        default: "Inspect this project and improve it where useful."
      branch:
        description: "Branch to run on"
        required: true
        default: "main"
      model:
        description: "AI model to use"
        required: false
        default: "opencode/qwen3.6-plus-free"
      working_directory:
        description: "Subdirectory to work in (leave empty for repo root)"
        required: false
        default: ""

permissions: write-all

jobs:
  opencode:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      DISPLAY: ":99"
      STREAM_PORT: "8765"
      SCREEN_WIDTH: "1440"
      SCREEN_HEIGHT: "900"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Install Linux GUI, automation, and HTTP stream dependencies
        run: |
          sudo apt-get install -y \
            xvfb \
            fluxbox \
            xdotool \
            x11-utils \
            scrot \
            imagemagick \
            curl \
            wget \
            jq \
            python3 \
            python3-aiohttp

      - name: Start virtual Linux desktop
        run: |
          Xvfb :99 -screen 0 ${SCREEN_WIDTH}x${SCREEN_HEIGHT}x24 > /tmp/xvfb.log 2>&1 &
          sleep 2

          fluxbox > /tmp/fluxbox.log 2>&1 &
          sleep 2

          xdpyinfo -display :99 >/dev/null

      - name: Create HTTP image and terminal streaming server
        run: |
          cat > /tmp/http_stream.py <<'PY'
          import asyncio
          import json
          import os
          import subprocess
          import time
          from aiohttp import web

          DISPLAY = os.environ.get("DISPLAY", ":99")
          STREAM_PORT = int(os.environ.get("STREAM_PORT", "8765"))
          SCREEN_WIDTH = int(os.environ.get("SCREEN_WIDTH", "1280"))
          SCREEN_HEIGHT = int(os.environ.get("SCREEN_HEIGHT", "900"))

          SCREENSHOT_PATH = "/tmp/http-screen.jpg"
          OPENCODE_LOG_PATH = "/tmp/opencode-output.log"

          INDEX_HTML = f"""
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8" />
            <title>OpenCode Live UI + Terminal</title>
            <style>
              html, body {{
                margin: 0;
                padding: 0;
                background: #111;
                color: #eee;
                font-family: Arial, sans-serif;
                overflow: auto;
              }}

              #bar {{
                padding: 8px 12px;
                background: #222;
                position: sticky;
                top: 0;
                z-index: 10;
                border-bottom: 1px solid #333;
              }}

              #layout {{
                display: flex;
                align-items: flex-start;
                gap: 12px;
                padding: 12px;
              }}

              #screen-wrap {{
                flex: 0 0 auto;
                background: #000;
                border: 1px solid #444;
                width: {SCREEN_WIDTH}px;
                height: {SCREEN_HEIGHT}px;
                overflow: hidden;
              }}

              #screen {{
                display: block;
                width: {SCREEN_WIDTH}px;
                height: {SCREEN_HEIGHT}px;
                max-width: none;
                max-height: none;
                object-fit: none;
                cursor: crosshair;
              }}

              #terminal-wrap {{
                flex: 0 0 700px;
                height: {SCREEN_HEIGHT}px;
                background: #050505;
                border: 1px solid #444;
                overflow: hidden;
                display: flex;
                flex-direction: column;
              }}

              #terminal-title {{
                padding: 8px;
                background: #181818;
                border-bottom: 1px solid #333;
                font-weight: bold;
              }}

              #terminal {{
                margin: 0;
                padding: 10px;
                flex: 1;
                overflow: auto;
                white-space: pre-wrap;
                word-break: break-word;
                font-family: Consolas, Monaco, monospace;
                font-size: 13px;
                line-height: 1.35;
                color: #d8d8d8;
              }}

              .small {{
                color: #aaa;
                font-size: 12px;
              }}
            </style>
          </head>
          <body>
            <div id="bar">
              <strong>OpenCode Live View</strong>
              <span class="small">
                — NO WebSockets
                — GUI is 1:1 at {SCREEN_WIDTH}x{SCREEN_HEIGHT}
                — HTTP MJPEG stream + HTTP terminal polling
              </span>
            </div>

            <div id="layout">
              <div id="screen-wrap">
                <img id="screen" src="/stream.mjpg" />
              </div>

              <div id="terminal-wrap">
                <div id="terminal-title">OpenCode terminal output</div>
                <pre id="terminal">Waiting for OpenCode output...</pre>
              </div>
            </div>

            <script>
              const img = document.getElementById("screen");
              const terminal = document.getElementById("terminal");

              let userScrolledTerminal = false;

              terminal.addEventListener("scroll", () => {{
                const nearBottom =
                  terminal.scrollHeight - terminal.scrollTop - terminal.clientHeight < 40;
                userScrolledTerminal = !nearBottom;
              }});

              async function refreshTerminal() {{
                try {{
                  const response = await fetch("/terminal", {{
                    cache: "no-store"
                  }});

                  const text = await response.text();
                  terminal.textContent = text || "Waiting for OpenCode output...";

                  if (!userScrolledTerminal) {{
                    terminal.scrollTop = terminal.scrollHeight;
                  }}
                }} catch (error) {{
                  terminal.textContent = "Could not load terminal output: " + error;
                }}
              }}

              setInterval(refreshTerminal, 1000);
              refreshTerminal();

              img.addEventListener("click", async (event) => {{
                const rect = img.getBoundingClientRect();

                const x = Math.round((event.clientX - rect.left) * {SCREEN_WIDTH} / rect.width);
                const y = Math.round((event.clientY - rect.top) * {SCREEN_HEIGHT} / rect.height);

                await fetch("/click", {{
                  method: "POST",
                  headers: {{
                    "Content-Type": "application/json"
                  }},
                  body: JSON.stringify({{
                    x,
                    y
                  }})
                }});
              }});

              window.addEventListener("keydown", async (event) => {{
                const allowed = [
                  "ArrowUp",
                  "ArrowDown",
                  "ArrowLeft",
                  "ArrowRight",
                  "Enter",
                  "Escape",
                  "Backspace",
                  "Tab",
                  " "
                ];

                if (!allowed.includes(event.key)) {{
                  return;
                }}

                event.preventDefault();

                await fetch("/key", {{
                  method: "POST",
                  headers: {{
                    "Content-Type": "application/json"
                  }},
                  body: JSON.stringify({{
                    key: event.key
                  }})
                }});
              }});
            </script>
          </body>
          </html>
          """

          def run_cmd(args):
              env = os.environ.copy()
              env["DISPLAY"] = DISPLAY

              return subprocess.run(
                  args,
                  env=env,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
              )

          def take_jpeg_screenshot():
              png_path = "/tmp/http-screen.png"

              result = run_cmd(["scrot", png_path])

              if result.returncode != 0:
                  raise RuntimeError(result.stderr or result.stdout or "scrot failed")

              convert = run_cmd([
                  "convert",
                  png_path,
                  "-quality",
                  "80",
                  SCREENSHOT_PATH
              ])

              if convert.returncode != 0:
                  raise RuntimeError(convert.stderr or convert.stdout or "convert failed")

              with open(SCREENSHOT_PATH, "rb") as f:
                  return f.read()

          def read_terminal_log():
              if not os.path.exists(OPENCODE_LOG_PATH):
                  return "Waiting for OpenCode output..."

              try:
                  with open(OPENCODE_LOG_PATH, "rb") as f:
                      f.seek(0, os.SEEK_END)
                      size = f.tell()
                      f.seek(max(size - 60000, 0), os.SEEK_SET)
                      return f.read().decode("utf-8", errors="replace")
              except Exception as e:
                  return f"Could not read OpenCode log: {e}"

          async def index(request):
              return web.Response(
                  text=INDEX_HTML,
                  content_type="text/html"
              )

          async def stream_mjpeg(request):
              response = web.StreamResponse(
                  status=200,
                  reason="OK",
                  headers={
                      "Content-Type": "multipart/x-mixed-replace; boundary=frame",
                      "Cache-Control": "no-cache, no-store, must-revalidate",
                      "Pragma": "no-cache",
                      "Expires": "0",
                  },
              )

              await response.prepare(request)

              while True:
                  try:
                      jpg = take_jpeg_screenshot()

                      await response.write(b"--frame\r\n")
                      await response.write(b"Content-Type: image/jpeg\r\n")
                      await response.write(f"Content-Length: {len(jpg)}\r\n\r\n".encode("ascii"))
                      await response.write(jpg)
                      await response.write(b"\r\n")

                      await asyncio.sleep(0.5)
                  except asyncio.CancelledError:
                      break
                  except Exception as e:
                      error = str(e).encode("utf-8", errors="replace")
                      await response.write(b"--frame\r\n")
                      await response.write(b"Content-Type: text/plain\r\n\r\n")
                      await response.write(error)
                      await response.write(b"\r\n")
                      await asyncio.sleep(1)

              return response

          async def terminal(request):
              return web.Response(
                  text=read_terminal_log(),
                  content_type="text/plain"
              )

          async def click(request):
              data = await request.json()
              x = str(int(data.get("x", 0)))
              y = str(int(data.get("y", 0)))

              run_cmd(["xdotool", "mousemove", x, y, "click", "1"])

              return web.json_response({
                  "ok": True,
                  "x": x,
                  "y": y
              })

          async def key(request):
              data = await request.json()
              key_name = str(data.get("key", ""))

              key_map = {
                  "ArrowUp": "Up",
                  "ArrowDown": "Down",
                  "ArrowLeft": "Left",
                  "ArrowRight": "Right",
                  "Enter": "Return",
                  "Escape": "Escape",
                  "Backspace": "BackSpace",
                  "Tab": "Tab",
                  " ": "space",
              }

              mapped = key_map.get(key_name)

              if mapped:
                  run_cmd(["xdotool", "key", mapped])

              return web.json_response({
                  "ok": True,
                  "key": key_name,
                  "mapped": mapped
              })

          async def health(request):
              return web.Response(text="ok\n")

          app = web.Application()
          app.router.add_get("/", index)
          app.router.add_get("/index.html", index)
          app.router.add_get("/stream.mjpg", stream_mjpeg)
          app.router.add_get("/terminal", terminal)
          app.router.add_post("/click", click)
          app.router.add_post("/key", key)
          app.router.add_get("/health", health)

          if __name__ == "__main__":
              web.run_app(app, host="0.0.0.0", port=STREAM_PORT)
          PY

      - name: Start HTTP image and terminal stream
        run: |
          touch /tmp/opencode-output.log

          python3 /tmp/http_stream.py > /tmp/http-stream.log 2>&1 &
          sleep 3

          curl -f http://localhost:${STREAM_PORT}/health

      - name: Install cloudflared
        run: |
          wget -q -O cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: Start Cloudflare tunnel to HTTP stream
        run: |
          cloudflared tunnel --url http://localhost:${STREAM_PORT} --no-autoupdate > /tmp/cloudflared.log 2>&1 &

          for i in {1..60}; do
            URL="$(grep -o 'https://[-a-z0-9.]*trycloudflare.com' /tmp/cloudflared.log | head -n 1 || true)"

            if [ -n "$URL" ]; then
              echo "STREAM_URL=$URL" >> "$GITHUB_ENV"
              echo "::notice title=Live OpenCode UI + Terminal::$URL"
              exit 0
            fi

            sleep 2
          done

          echo "Cloudflare tunnel did not start correctly."
          cat /tmp/cloudflared.log
          exit 1

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Create UI helper commands for OpenCode
        run: |
          cat > /tmp/ui <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          export DISPLAY="${DISPLAY:-:99}"

          case "${1:-}" in
            screenshot)
              scrot /tmp/ui-screenshot.png
              echo "/tmp/ui-screenshot.png"
              ;;

            click)
              xdotool mousemove "$2" "$3" click 1
              ;;

            rightclick)
              xdotool mousemove "$2" "$3" click 3
              ;;

            doubleclick)
              xdotool mousemove "$2" "$3" click --repeat 2 --delay 100 1
              ;;

            key)
              xdotool key "$2"
              ;;

            type)
              shift
              xdotool type --delay 20 "$*"
              ;;

            mousemove)
              xdotool mousemove "$2" "$3"
              ;;

            window-list)
              xdotool search --onlyvisible --name ".*" getwindowname %@ || true
              ;;

            *)
              echo "Usage:"
              echo "  ui screenshot"
              echo "  ui click X Y"
              echo "  ui rightclick X Y"
              echo "  ui doubleclick X Y"
              echo "  ui key KEY"
              echo "  ui type TEXT"
              echo "  ui mousemove X Y"
              echo "  ui window-list"
              exit 1
              ;;
          esac
          EOF

          chmod +x /tmp/ui
          sudo ln -sf /tmp/ui /usr/local/bin/ui

      - name: Run OpenCode
        id: opencode_run
        env:
          INPUT_PROMPT: ${{ github.event.inputs.prompt }}
          INPUT_MODEL: ${{ github.event.inputs.model }}
          INPUT_DIR: ${{ github.event.inputs.working_directory }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}       
          SCREEN_WIDTH: "1440"
          SCREEN_HEIGHT: "900"

        run: |
          TARGET_DIR="."
          if [ -n "$INPUT_DIR" ]; then
            TARGET_DIR="$INPUT_DIR"
          fi

          cd "$TARGET_DIR"

          SYSTEM_PROMPT="You are an autonomous AI agent running in GitHub Actions.

          ROLE:
          You are a skilled software engineer with expertise in code review, refactoring, bug fixing, feature implementation, and GUI testing.

          ENVIRONMENT:
          You are running on Linux in GitHub Actions.
          The virtual desktop is available on DISPLAY=:99.
          The screen dimentions are ${SCREEN_WIDTH}x${SCREEN_HEIGHT}

          GUI CONTROL:
          You can interact with GUI applications using these shell commands:
          - ui screenshot
          - ui click X Y
          - ui rightclick X Y
          - ui doubleclick X Y
          - ui key KEY
          - ui type TEXT
          - ui mousemove X Y
          - ui window-list

          GUI RULES:
          1. Always take a screenshot before clicking.
          2. Use coordinates carefully.
          3. If you need to launch a GUI app, launch it with DISPLAY=:99.
          4. Use ui window-list when you need to understand open windows.
          5. If a captcha appears, do not solve or bypass it. Report that automation is blocked and suggest test or development captcha settings.

          BEHAVIOR RULES:
          1. Always read and understand existing code before making changes.
          2. Follow the existing code style and conventions of the project.
          3. Make incremental, well-tested changes.
          4. Never break existing functionality.
          5. Write clear, concise code without unnecessary comments.
          6. Prefer editing existing files over creating new ones.
          7. Always verify your changes work before committing.

          WORKFLOW:
          1. Explore the codebase to understand structure and conventions.
          2. Plan your changes mentally before executing.
          3. Make one logical change at a time.
          4. After each file edit, commit immediately with a descriptive message.
          5. Run any available tests or linting after changes.
          6. If something fails, diagnose and fix before proceeding.
          7. Push before you stop.

          COMMIT STANDARDS:
          - Use conventional commit format when possible: feat:, fix:, refactor:, docs:, chore:.
          - Keep commits atomic.
          - Write meaningful commit messages that explain what changed and why.
          - Git config is already done.

          ERROR HANDLING:
          - If a tool fails, retry once with adjusted parameters.
          - If stuck, document the issue and move on.
          - Never leave the codebase in a broken state.

          USER REQUEST:
          ${INPUT_PROMPT}

          Remember:
          - After each edit, commit what you have done.
          - Write instructions for your future self down in a .opencode folder.
          - Use the GUI tools when needed.
          - Use screenshots before clicking."

          FULL_PROMPT=${SYSTEM_PROMPT}

          echo "=== Starting OpenCode Run ==="
          echo "Model: $INPUT_MODEL"
          echo "Working directory: $TARGET_DIR"
          echo "Display: $DISPLAY"
          echo "Screen: ${SCREEN_WIDTH}x${SCREEN_HEIGHT}"
          echo "Transport: HTTP only, no WebSockets"
          printf 'User prompt: %s\n' "$INPUT_PROMPT"
          echo "Prompt length: ${#FULL_PROMPT} characters"
          echo ""

          opencode run "$FULL_PROMPT" --model "$INPUT_MODEL" --thinking --dangerously-skip-permissions 2>&1 | tee -a /tmp/opencode-output.log

      - name: Upload UI logs and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-debug
          path: |
            /tmp/*.log
            /tmp/ui-screenshot.png
            /tmp/http-screen.jpg
            /tmp/http-screen.png
            /tmp/opencode-output.log
