name: OpenCode Issue Solver

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  opencode:
    name: Solve Issue
    runs-on: ubuntu-latest
    timeout-minutes: 360

    if: |
      github.actor != 'github-actions[bot]' &&
      github.actor != 'opencode-agent[bot]'

    env:
      MODEL: "opencode/qwen3.6-plus-free"
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: "${{ github.event.issue.title }}"
      BASE_BRANCH: "main"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_BRANCH }}
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git jq

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Configure git bot
        run: |
          git config user.name "opencode-agent[bot]"
          git config user.email "opencode-agent@users.noreply.github.com"

      - name: Read issue body safely
        id: issue
        run: |
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "${{ github.event.issue.body }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create issue branch
        id: branch
        run: |
          BRANCH="opencode/issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Comment: starting work
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "🤖 OpenCode started working on this issue..."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run OpenCode
        run: |
          SYSTEM_PROMPT="You are an autonomous AI developer solving a GitHub issue.

          ISSUE TITLE:
          $ISSUE_TITLE

          ISSUE DESCRIPTION:
          ${{ steps.issue.outputs.body }}

          TASK:
          - Understand the issue
          - Implement a correct fix or feature
          - Keep changes safe and minimal

          RULES:
          - Commit after each change
          - Use clear commit messages
          - Do not break the project
          - Stay focused on this issue only"

          opencode run "$SYSTEM_PROMPT" \
            --model "$MODEL" \
            --thinking \
            --dangerously-skip-permissions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Final commit if needed
        run: |
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add -A
            git commit -m "fix(issue #$ISSUE_NUMBER): finalize solution"
          fi

      - name: Push branch
        run: |
          git push origin ${{ steps.branch.outputs.branch }}

      - name: Create PR
        id: pr
        run: |
          URL=$(gh pr create \
            --title "Fix: $ISSUE_TITLE" \
            --body "Closes #$ISSUE_NUMBER" \
            --base $BASE_BRANCH \
            --head ${{ steps.branch.outputs.branch }})

          echo "pr_url=$URL" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment PR link
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "✅ Fix created: ${{ steps.pr.outputs.pr_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR
        run: |
          gh pr merge "${{ steps.pr.outputs.pr_url }}" \
            --squash \
            --delete-branch \
            --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close issue
        run: |
          gh issue close "$ISSUE_NUMBER" \
            --comment "✅ Issue solved automatically by OpenCode."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
