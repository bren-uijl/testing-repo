name: OpenCode Issue Solver

on:
  issues:
    types:
      - opened
      - reopened
      - edited
  issue_comment:
    types:
      - created
      - edited

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  opencode:
    name: Solve Issue
    runs-on: ubuntu-latest
    timeout-minutes: 360

    if: |
      github.actor != 'github-actions[bot]' &&
      github.actor != 'Vinkbot'

    env:
      MODEL: "opencode/qwen3.6-plus-free"
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: "${{ github.event.issue.title }}"
      BASE_BRANCH: "main"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_BRANCH }}
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git jq

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Configure git bot
        run: |
          git config user.name "Vinkbot"
          git config user.email "272188895+Vinkbot@users.noreply.github.com"

      - name: Read issue body safely
        id: issue
        run: |
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "${{ github.event.issue.body }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create issue branch
        id: branch
        run: |
          BRANCH="opencode/issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: comment starting work
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "🤖 OpenCode is analyzing this issue and will decide how to proceed..."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run OpenCode
        id: opencode_run
        run: |
          SYSTEM_PROMPT="You are an autonomous AI developer analyzing a GitHub issue.

          ISSUE TITLE:
          $ISSUE_TITLE

          ISSUE DESCRIPTION:
          ${{ steps.issue.outputs.body }}

          PHASE 1 - DECISION (do this first):
          Analyze the issue and decide one of:
          - ACCEPT: The issue is valid, clear, and you can implement it
          - DENY: The issue is invalid, spam, duplicate, or cannot be solved
          - NEEDS_INFO: The issue lacks critical details to proceed

          Write your decision to a file called 'opencode-decision.json' with this format:
          {
            \"decision\": \"ACCEPT\" | \"DENY\" | \"NEEDS_INFO\",
            \"reason\": \"Brief explanation of your decision\",
            \"labels\": [\"label1\", \"label2\"]
          }

          Suggested labels by decision type:
          - ACCEPT: [\"opencode-working\", \"in-progress\"]
          - DENY: [\"wontfix\", \"invalid\", or \"spam\" as appropriate]
          - NEEDS_INFO: [\"needs-more-info\", \"blocked\"]

          PHASE 2 - ACTION (only if ACCEPT):
          - Understand the issue fully
          - Implement a correct fix or feature
          - Keep changes safe and minimal
          - Commit after each logical change
          - Use clear commit messages

          RULES:
          - You only get ONE run - make all decisions now
          - Always create the opencode-decision.json file
          - Do not break the project
          - Stay focused on this issue only
          - If you implement changes, commit them before finishing"

          opencode run "$SYSTEM_PROMPT" \
            --model "$MODEL" \
            --thinking \
            --dangerously-skip-permissions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read decision
        id: decision
        run: |
          if [ -f "opencode-decision.json" ]; then
            DECISION=$(jq -r '.decision' opencode-decision.json)
            REASON=$(jq -r '.reason' opencode-decision.json)
            LABELS=$(jq -r '.labels | join(",")' opencode-decision.json)
            echo "decision=$DECISION" >> $GITHUB_OUTPUT
            echo "reason=$REASON" >> $GITHUB_OUTPUT
            echo "labels=$LABELS" >> $GITHUB_OUTPUT
          else
            echo "decision=ACCEPT" >> $GITHUB_OUTPUT
            echo "reason=No decision file found, defaulting to ACCEPT" >> $GITHUB_OUTPUT
            echo "labels=opencode-working" >> $GITHUB_OUTPUT
          fi

      - name: Apply labels
        run: |
          IFS=',' read -ra LABELS <<< "${{ steps.decision.outputs.labels }}"
          for label in "${LABELS[@]}"; do
            gh issue edit "$ISSUE_NUMBER" --add-label "$label" || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment decision
        if: steps.decision.outputs.decision != 'ACCEPT'
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "🤖 OpenCode analysis complete.

            **Decision:** ${{ steps.decision.outputs.decision }}
            **Reason:** ${{ steps.decision.outputs.reason }}

            Labels have been applied automatically."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Final commit if changes were made
        if: steps.decision.outputs.decision == 'ACCEPT'
        run: |
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add -A
            git commit -m "fix(issue #$ISSUE_NUMBER): finalize solution"
          fi

      - name: Try push branch
        id: push
        if: steps.decision.outputs.decision == 'ACCEPT'
        continue-on-error: true
        run: |
          git push origin ${{ steps.branch.outputs.branch }} 2>&1 || echo "push_failed=true" >> $GITHUB_OUTPUT

      - name: Create PR if push succeeded
        id: pr
        if: steps.decision.outputs.decision == 'ACCEPT' && steps.push.outputs.push_failed != 'true'
        run: |
          URL=$(gh pr create \
            --title "Fix: $ISSUE_TITLE" \
            --body "Closes #$ISSUE_NUMBER" \
            --base $BASE_BRANCH \
            --head ${{ steps.branch.outputs.branch }})

          echo "pr_url=$URL" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment PR link
        if: steps.pr.outputs.pr_url != ''
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "✅ Fix created: ${{ steps.pr.outputs.pr_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR
        if: steps.pr.outputs.pr_url != ''
        run: |
          gh pr merge "${{ steps.pr.outputs.pr_url }}" \
            --squash \
            --delete-branch \
            --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fallback - Create PR with patch if push failed
        if: steps.decision.outputs.decision == 'ACCEPT' && steps.push.outputs.push_failed == 'true'
        run: |
          echo "Push failed, creating fallback issue with changes..."

          PATCH_FILE="/tmp/changes.patch"
          git diff HEAD > "$PATCH_FILE" 2>/dev/null || echo "No diff available"

          CHANGES_SUMMARY=$(git diff --stat HEAD 2>/dev/null || echo "Unable to generate diff")

          gh issue create \
            --title "FALLBACK: Changes for issue #$ISSUE_NUMBER - $ISSUE_TITLE" \
            --body "OpenCode attempted to solve issue #$ISSUE_NUMBER but could not push changes.

            **Original issue:** #$ISSUE_NUMBER
            **Decision:** ${{ steps.decision.outputs.decision }}
            **Reason:** ${{ steps.decision.outputs.reason }}

            **Changes that were made:**
            \`\`\`
            $CHANGES_SUMMARY
            \`\`\`

            A human developer needs to apply these changes manually.

            **Decision file content:**
            \`\`\`json
            $(cat opencode-decision.json 2>/dev/null || echo 'No decision file')
            \`\`\`" \
            --label "opencode-fallback,needs-manual-review"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close issue if accepted and PR created
        if: steps.decision.outputs.decision == 'ACCEPT' && steps.pr.outputs.pr_url != ''
        run: |
          gh issue close "$ISSUE_NUMBER" \
            --comment "✅ Issue solved automatically by OpenCode. PR: ${{ steps.pr.outputs.pr_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
