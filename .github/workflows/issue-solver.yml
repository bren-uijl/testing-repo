name: OpenCode Issue Solver

on:
  issues:
    types:
      - opened
      - reopened
      - edited
  issue_comment:
    types:
      - created
      - edited

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  opencode:
    name: Run Vinkbot
    runs-on: ubuntu-latest
    timeout-minutes: 360

    if: |
      github.actor != 'github-actions[bot]' &&
      github.actor != 'Vinkbot' &&
      github.event.issue.pull_request == null

    env:
      MODEL: "opencode/deepseek-v4-flash-free"
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      BASE_BRANCH: "main"
      EVENT_NAME: ${{ github.event_name }}
      LATEST_COMMENT: ${{ github.event.comment.body || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_BRANCH }}
          fetch-depth: 0

      - name: Install dependencies
        run: |
          set -euo pipefail

          sudo apt-get update -qq
          sudo apt-get install -y curl git jq

      - name: Install OpenCode
        run: |
          set -euo pipefail

          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      - name: Configure git bot
        run: |
          set -euo pipefail

          git config user.name "Vinkbot"
          git config user.email "272188895+Vinkbot@users.noreply.github.com"

      - name: Read issue context
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh issue view "$ISSUE_NUMBER" \
            --json title,body,comments,labels,state,author,createdAt,updatedAt,url \
            > /tmp/issue-context.json

          ISSUE_BODY="$(jq -r '.body // ""' /tmp/issue-context.json)"
          FULL_ISSUE_CONTEXT="$(jq -r '.' /tmp/issue-context.json)"
          ISSUE_URL="$(jq -r '.url // ""' /tmp/issue-context.json)"

          {
            echo "body<<ISSUE_BODY_EOF"
            echo "$ISSUE_BODY"
            echo "ISSUE_BODY_EOF"

            echo "full_context<<FULL_CONTEXT_EOF"
            echo "$FULL_ISSUE_CONTEXT"
            echo "FULL_CONTEXT_EOF"

            echo "url=$ISSUE_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Create work branch
        id: branch
        run: |
          set -euo pipefail

          BRANCH="opencode/issue-${ISSUE_NUMBER}-${GITHUB_RUN_ID}"
          git checkout -B "$BRANCH"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Build OpenCode prompt
        env:
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
          FULL_ISSUE_CONTEXT: ${{ steps.issue.outputs.full_context }}
          ISSUE_URL: ${{ steps.issue.outputs.url }}
        run: |
          set -euo pipefail

          cat > /tmp/opencode-prompt.md <<'PROMPT_EOF'
          You are Vinkbot, an automated GitHub issue assistant running inside a GitHub Actions workflow.

          You have access to the GitHub CLI through `gh`.

          You can:
          - read issues and comments
          - reply to comments using `gh issue comment`
          - add helpful labels using `gh issue edit`
          - inspect the repository
          - make code changes when the issue clearly asks for code or file changes
          - commit changes when needed
          - view images using the image subagent (Image).

          You must not:
          - close issues
          - merge pull requests
          - claim that an issue is finally solved
          - treat every comment as a coding request
          - create code changes for a simple ping, test, or status-check comment

          Humans decide when an issue is actually solved.

          Tone:
          - Be friendly
          - Be short when the user only asks for a simple response
          - Do not sound overly formal
          - Do not write long explanations unless useful

          Simple ping/test behavior:
          If the latest comment is only asking whether you are working, whether you can read the comment, or asking for a simple response, then:
          - reply briefly with `gh issue comment`
          - do not edit files
          - do not commit
          - do not create a pull request
          - do not add a `solved` label

          Good example response for a ping:
          "Yes — I'm here and working"

          For real issues:
          - If the issue is clear and actionable, make the smallest safe change.
          - If the issue asks to update a workflow file, you may edit the workflow file.
          - If the issue is unclear, ask a friendly question using `gh issue comment`.
          - If the issue should not be implemented, explain briefly and optionally add a label such as `wontfix`.
          - If you prepare code changes, commit them with a clear commit message.
          - Do not create a pull request yourself; the workflow will do that if files changed.
          - Do not write `opencode-decision.json`; it is not used.
          - Dont respond normally, since youre an agent inside github actions, you have to respond on the issue using `gh issue comment`.

          Important GitHub CLI rules:
          - Use `gh issue comment "$ISSUE_NUMBER" --body "..."`
          - Use `gh issue edit "$ISSUE_NUMBER" --add-label "label-name"` when useful.
          - The environment variable `GH_TOKEN` is available.


          SUPERIMPORTANT: 
          - CREATE AFTER EDITING FILES ALWAYS AN PR IF THE USER ASKED FOR CHANGES. 
          - DONT RESPOND NORMALLY, RESPOND BY RESPONDING ON THE ISSUE USING `GH ISSUE COMMENT`.

          Current event:
          __EVENT_NAME__

          Issue number:
          __ISSUE_NUMBER__

          Issue title:
          __ISSUE_TITLE__

          Issue URL:
          __ISSUE_URL__

          Latest comment, if this run was triggered by a comment:
          __LATEST_COMMENT__

          Issue body:
          __ISSUE_BODY__

          Full issue context as JSON:
          __FULL_ISSUE_CONTEXT__
          PROMPT_EOF

          python3 - <<'PY'
          from pathlib import Path
          import os

          prompt_path = Path("/tmp/opencode-prompt.md")
          prompt = prompt_path.read_text()

          replacements = {
              "__EVENT_NAME__": os.environ.get("EVENT_NAME", ""),
              "__ISSUE_NUMBER__": os.environ.get("ISSUE_NUMBER", ""),
              "__ISSUE_TITLE__": os.environ.get("ISSUE_TITLE", ""),
              "__ISSUE_URL__": os.environ.get("ISSUE_URL", ""),
              "__LATEST_COMMENT__": os.environ.get("LATEST_COMMENT", ""),
              "__ISSUE_BODY__": os.environ.get("ISSUE_BODY", ""),
              "__FULL_ISSUE_CONTEXT__": os.environ.get("FULL_ISSUE_CONTEXT", ""),
          }

          for key, value in replacements.items():
              prompt = prompt.replace(key, value)

          prompt_path.write_text(prompt)
          PY

      - name: Run OpenCode
        id: opencode_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          opencode run "$(cat /tmp/opencode-prompt.md)" \
            --model "$MODEL" \
            --thinking \
            --dangerously-skip-permissions \
            --variant max

      - name: Check for repository changes
        id: changes
        run: |
          set -euo pipefail

          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if no files changed
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "No repository changes were made. Nothing to push or turn into a PR."

      - name: Commit changes
        id: commit
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail

          git add -A
          git commit -m "fix(issue #$ISSUE_NUMBER): proposed update"

          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Try push branch
        id: push
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail

          if git push origin "${{ steps.branch.outputs.branch }}"; then
            echo "push_failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "push_failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        id: pr
        if: steps.changes.outputs.has_changes == 'true' && steps.push.outputs.push_failed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PR_BODY="$(cat <<EOF
          Related to #$ISSUE_NUMBER

          I prepared a proposed change for review.

          I will not close the issue myself.
          EOF
          )"

          URL="$(gh pr create \
            --title "Proposed update: $ISSUE_TITLE" \
            --body "$PR_BODY" \
            --base "$BASE_BRANCH" \
            --head "${{ steps.branch.outputs.branch }}")"

          echo "pr_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Add ready-for-review label
        if: steps.pr.outputs.pr_url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "ready-for-review" || true

      - name: Comment pull request link
        if: steps.pr.outputs.pr_url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "$(cat <<EOF
          I opened a proposed update: ${{ steps.pr.outputs.pr_url }}

          Please review it when you can. I won’t close the issue myself.
          EOF
          )"

      - name: Fallback if push failed
        if: steps.changes.outputs.has_changes == 'true' && steps.push.outputs.push_failed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          SUMMARY_FILE="/tmp/opencode-issue-${ISSUE_NUMBER}-summary.txt"
          PATCH_FILE="/tmp/opencode-issue-${ISSUE_NUMBER}.patch"

          git diff --stat "$BASE_BRANCH"...HEAD > "$SUMMARY_FILE" || echo "Unable to generate diff summary." > "$SUMMARY_FILE"
          git diff "$BASE_BRANCH"...HEAD > "$PATCH_FILE" || echo "Unable to generate patch." > "$PATCH_FILE"

          CHANGES_SUMMARY="$(cat "$SUMMARY_FILE")"

          FALLBACK_BODY="$(cat <<EOF
          I prepared changes for #$ISSUE_NUMBER, but I could not push the branch.

          This can happen when the workflow tries to change protected workflow files.

          Original issue: #$ISSUE_NUMBER

          Changes summary:

          \`\`\`
          $CHANGES_SUMMARY
          \`\`\`

          A human needs to apply or push these changes manually.

          I did not close the original issue.
          EOF
          )"

          gh issue create \
            --title "Manual review needed for issue #$ISSUE_NUMBER - $ISSUE_TITLE" \
            --body "$FALLBACK_BODY" \
            --label "needs-manual-review" || true

          gh issue comment "$ISSUE_NUMBER" \
            --body "I prepared changes, but I couldn’t push them. I created a manual-review fallback issue instead."
